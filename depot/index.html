<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Watchlist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0c0c0f; --surface: #141418; --surface2: #1c1c22; --surface3: #22222a;
  --border: rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.14);
  --text: #f0ede8; --muted: #888880; --muted2: #555550;
  --accent: #c8f060; --accent-dim: rgba(200,240,96,0.12); --accent-dim2: rgba(200,240,96,0.06);
  --red: #ff5f5f; --red-dim: rgba(255,95,95,0.12);
  --green: #5dca8c; --green-dim: rgba(93,202,140,0.12);
  --blue: #60b8f0; --blue-dim: rgba(96,184,240,0.12);
  --mono: 'Syne Mono', monospace; --sans: 'Syne', sans-serif;
  --sidebar: 340px;
  --header-h: 58px;
}
html { background: var(--bg); color: var(--text); font-family: var(--sans); }
body { min-height: 100vh; max-width: 480px; margin: 0 auto; padding: 0 0 14rem; }

/* ── Header ── */
.header {
  padding: 0.9rem 1rem 0.6rem;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--bg); z-index: 10;
}
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.7rem; }
.logo { font-size: 1rem; font-weight: 800; letter-spacing: -0.02em; display: flex; align-items: center; gap: 0.4rem; }
.logo span.dot { color: var(--accent); }
.logo-sub { font-family: var(--mono); font-size: 0.5rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 0.05rem; }
.header-btns { display: flex; gap: 0.35rem; flex-wrap: wrap; justify-content: flex-end; }
.hbtn {
  font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.06em; text-transform: uppercase;
  background: none; border: 1px solid var(--border); color: var(--muted);
  padding: 0.26rem 0.52rem; border-radius: 4px; cursor: pointer; transition: all 0.15s;
}
.hbtn:hover { border-color: var(--border-hover); color: var(--text); }
.hbtn.active-sync { border-color: rgba(200,240,96,0.4); color: var(--accent); }
.hbtn.reorder-active { border-color: rgba(96,184,240,0.4); color: var(--blue); background: var(--blue-dim); }

/* Summary bar */
.summary { display: grid; grid-template-columns: repeat(3, 1fr); }
.summary-item { padding: 0.3rem 0; text-align: center; }
.summary-item:not(:last-child) { border-right: 1px solid var(--border); }
.summary-label { font-family: var(--mono); font-size: 0.46rem; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.08rem; line-height: 1.4; }
.summary-value { font-size: 0.76rem; font-weight: 700; font-family: var(--mono); letter-spacing: -0.01em; }

/* ── Watchlist ── */
.watchlist { padding: 0.4rem 0; }
.empty-state { padding: 2.5rem 1rem; text-align: center; color: var(--muted); font-size: 0.85rem; line-height: 1.6; }
.empty-state strong { display: block; font-size: 0.95rem; color: var(--text); margin-bottom: 0.4rem; }

/* Drag & drop */
.watch-item {
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  animation: slideIn 0.3s ease both;
  transition: background 0.15s, opacity 0.15s;
  position: relative;
}
.watch-item.dragging { opacity: 0.4; }
.watch-item.drag-over { border-top: 2px solid var(--accent); }

@keyframes slideIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

/* Reorder mode handle */
.drag-handle {
  display: none; align-items: center; justify-content: center;
  width: 28px; flex-shrink: 0; cursor: grab; color: var(--muted2);
  font-size: 0.9rem; user-select: none; padding: 0 0.2rem;
}
.drag-handle:active { cursor: grabbing; }
.reorder-mode .drag-handle { display: flex; }
.reorder-mode .watch-item { cursor: default; }

/* Item header */
.item-header {
  display: grid; grid-template-columns: auto 1fr auto auto; gap: 0 0.6rem;
  align-items: center; padding: 0.8rem 1rem 0.45rem;
  cursor: pointer; user-select: none; transition: background 0.12s;
}
.reorder-mode .item-header { grid-template-columns: auto auto 1fr auto auto; cursor: default; }
.item-header:hover { background: var(--surface); }
.item-header:active { background: var(--surface2); }
.reorder-mode .item-header:hover { background: none; }
.reorder-mode .item-header:active { background: none; }

.ticker-badge {
  font-family: var(--mono); font-size: 0.65rem; font-weight: 600; letter-spacing: 0.05em;
  background: var(--surface2); border: 1px solid var(--border); color: var(--accent);
  padding: 0.2rem 0.45rem; border-radius: 4px; min-width: 48px; text-align: center;
}
.ticker-badge.manual { border-color: rgba(200,240,96,0.3); }
.item-name { font-size: 0.78rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-sub { font-family: var(--mono); font-size: 0.6rem; color: var(--muted); margin-top: 0.06rem; }
.item-price-badge { display: flex; flex-direction: column; align-items: flex-end; gap: 0.08rem; }
.item-price { font-family: var(--mono); font-size: 0.74rem; font-weight: 700; white-space: nowrap; }
.item-change { font-family: var(--mono); font-size: 0.6rem; white-space: nowrap; }
.item-change.up { color: var(--green); } .item-change.down { color: var(--red); } .item-change.flat { color: var(--muted); }

/* Item actions row */
.item-actions {
  display: flex; gap: 0.3rem; align-items: center; padding: 0 1rem 0.6rem;
  flex-wrap: wrap;
}
.action-btn {
  font-family: var(--mono); font-size: 0.54rem; letter-spacing: 0.05em; text-transform: uppercase;
  background: none; border: 1px solid var(--border); color: var(--muted);
  padding: 0.2rem 0.45rem; border-radius: 3px; cursor: pointer; transition: all 0.12s; white-space: nowrap;
}
.action-btn:hover { border-color: var(--border-hover); color: var(--text); }
.action-btn.danger:hover { border-color: var(--red); color: var(--red); }
.action-btn.info-active { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }
.action-btn.marker-active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* Expandable sections */
.expand-section { max-height: 0; overflow: hidden; transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1); }
.expand-section.open { max-height: 2000px; }

/* Chart */
.chart-inner { padding: 0 1rem 1rem; border-top: 1px solid var(--border); padding-top: 0.7rem; }
.chart-tabs { display: flex; gap: 0.28rem; margin-bottom: 0.65rem; flex-wrap: wrap; }
.chart-tab {
  font-family: var(--mono); font-size: 0.56rem; letter-spacing: 0.05em; text-transform: uppercase;
  background: none; border: 1px solid var(--border); color: var(--muted);
  padding: 0.16rem 0.38rem; border-radius: 3px; cursor: pointer; transition: all 0.12s;
}
.chart-tab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.chart-canvas-wrap { height: 150px; position: relative; }
canvas { display: block; width: 100% !important; }
.chart-loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 0.65rem; color: var(--muted); }

/* Info panel */
.info-panel { border-top: 1px solid var(--border); padding: 0.8rem 1rem; }
.info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem 1rem; margin-bottom: 0.6rem; }
.info-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem 0.6rem; }
.info-label { font-family: var(--mono); font-size: 0.47rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.08rem; }
.info-val { font-family: var(--mono); font-size: 0.72rem; font-weight: 600; }
.info-val.pos { color: var(--green); } .info-val.neg { color: var(--red); }
.info-sep { height: 1px; background: var(--border); margin: 0.6rem 0; }
.info-desc { font-size: 0.7rem; color: var(--muted); line-height: 1.65; }
.info-loading { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); padding: 0.5rem 0; text-align: center; }

/* Markers panel */
.markers-panel { border-top: 1px solid var(--border); padding: 0.7rem 1rem; }
.markers-title { font-family: var(--mono); font-size: 0.5rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
.marker-list { margin-bottom: 0.6rem; }
.marker-row {
  display: grid; grid-template-columns: 1fr auto auto auto;
  align-items: center; gap: 0.35rem;
  padding: 0.4rem 0; border-bottom: 1px solid var(--border);
}
.marker-row:last-child { border-bottom: none; }
.marker-info { font-size: 0.7rem; }
.marker-date { font-family: var(--mono); font-size: 0.56rem; color: var(--muted); margin-top: 0.04rem; }
.marker-ret { font-family: var(--mono); font-size: 0.65rem; text-align: right; }
.marker-ret.up { color: var(--green); } .marker-ret.down { color: var(--red); }
.marker-val { font-family: var(--mono); font-size: 0.63rem; color: var(--muted); text-align: right; }
.marker-del-btn {
  font-family: var(--mono); font-size: 0.54rem; background: none; border: 1px solid var(--border);
  color: var(--muted); padding: 0.15rem 0.35rem; border-radius: 3px; cursor: pointer; transition: all 0.12s;
}
.marker-del-btn:hover { border-color: var(--red); color: var(--red); }
.add-marker-form { border-top: 1px solid var(--border); padding-top: 0.55rem; margin-top: 0.2rem; }
.marker-form-title { font-family: var(--mono); font-size: 0.48rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.38rem; }
.marker-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.38rem; margin-bottom: 0.38rem; }
.marker-input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px;
  color: var(--text); font-family: var(--mono); font-size: 0.72rem;
  padding: 0.36rem 0.5rem; outline: none; transition: border-color 0.15s;
}
.marker-input::placeholder { color: var(--muted); font-size: 0.64rem; }
.marker-input:focus { border-color: var(--border-hover); }
.marker-add-btn {
  width: 100%; background: var(--accent-dim2); border: 1px solid rgba(200,240,96,0.3); border-radius: 5px;
  color: var(--accent); font-family: var(--mono); font-size: 0.62rem; font-weight: 700;
  letter-spacing: 0.05em; text-transform: uppercase; padding: 0.38rem; cursor: pointer; transition: all 0.15s;
}
.marker-add-btn:hover { background: var(--accent-dim); border-color: var(--accent); }

/* Manual price */
.manual-price-row { display: flex; align-items: center; gap: 0.5rem; border-top: 1px solid var(--border); padding: 0.5rem 1rem; }
.manual-price-label { font-family: var(--mono); font-size: 0.52rem; color: var(--muted); flex-shrink: 0; }
.manual-price-input {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 4px;
  color: var(--text); font-family: var(--mono); font-size: 0.72rem;
  padding: 0.26rem 0.5rem; outline: none; width: 110px; transition: border-color 0.15s;
}
.manual-price-input:focus { border-color: var(--border-hover); }
.manual-price-btn {
  font-family: var(--mono); font-size: 0.54rem; letter-spacing: 0.04em; text-transform: uppercase;
  background: none; border: 1px solid var(--border); color: var(--muted);
  padding: 0.18rem 0.4rem; border-radius: 3px; cursor: pointer; transition: all 0.12s;
}
.manual-price-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Refresh dot */
.refresh-dot {
  width: 5px; height: 5px; border-radius: 50%; background: var(--accent);
  display: inline-block; animation: pulse 2s ease-in-out infinite; vertical-align: middle;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* ── Bottom panel ── */
.bottom-panel {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  background: var(--bg); border-top: 1px solid var(--border); z-index: 20;
}
.panel-tabs { display: flex; border-bottom: 1px solid var(--border); }
.panel-tab {
  flex: 1; font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.07em; text-transform: uppercase;
  background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted);
  padding: 0.52rem 0; cursor: pointer; transition: all 0.15s;
}
.panel-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.panel-body { padding: 0.65rem 1rem 0.8rem; }

/* Search */
.search-wrap { position: relative; margin-bottom: 0.48rem; }
.search-input {
  width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font-family: var(--mono); font-size: 0.82rem;
  padding: 0.5rem 0.7rem; outline: none; transition: border-color 0.15s;
}
.search-input::placeholder { color: var(--muted); font-size: 0.72rem; }
.search-input:focus { border-color: var(--border-hover); }

.dropdown {
  position: absolute; bottom: calc(100% + 4px); left: 0; right: 0;
  background: var(--surface2); border: 1px solid var(--border-hover); border-radius: 6px;
  overflow-y: auto; max-height: 240px; display: none; z-index: 30;
}
.dropdown.visible { display: block; }
.dropdown-item {
  padding: 0.5rem 0.7rem; cursor: pointer; border-bottom: 1px solid var(--border);
  display: grid; grid-template-columns: auto 1fr auto; gap: 0.5rem; align-items: center;
  transition: background 0.1s;
}
.dropdown-item:last-child { border-bottom: none; }
.dropdown-item:hover { background: var(--surface); }
.dd-sym { font-family: var(--mono); font-size: 0.63rem; color: var(--accent); min-width: 50px; }
.dd-name { font-size: 0.72rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dd-right { text-align: right; }
.dd-price { font-family: var(--mono); font-size: 0.68rem; font-weight: 600; }
.dd-change { font-family: var(--mono); font-size: 0.56rem; }
.dd-change.up { color: var(--green); } .dd-change.down { color: var(--red); }
.dd-exch { font-family: var(--mono); font-size: 0.52rem; color: var(--muted); }
.dd-loading { padding: 0.65rem 0.7rem; font-family: var(--mono); font-size: 0.65rem; color: var(--muted); text-align: center; }

/* Add to watchlist pill */
.add-pill {
  display: none; align-items: center; gap: 0.45rem;
  background: var(--accent-dim); border: 1px solid var(--accent); border-radius: 4px;
  padding: 0.22rem 0.5rem; margin-bottom: 0.48rem;
}
.add-pill.visible { display: flex; }
.add-pill-sym { font-family: var(--mono); font-size: 0.68rem; font-weight: 700; color: var(--accent); }
.add-pill-name { font-size: 0.68rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.add-pill-x { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; line-height: 1; transition: color 0.12s; }
.add-pill-x:hover { color: var(--text); }
.add-watch-btn {
  background: var(--accent); border: none; border-radius: 6px; color: #0c0c0f;
  font-family: var(--mono); font-size: 0.68rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
  padding: 0.5rem 0.9rem; cursor: pointer; white-space: nowrap; transition: opacity 0.15s;
  display: block; width: 100%;
}
.add-watch-btn:hover { opacity: 0.88; }
.add-watch-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* Manual add */
.manual-toggle {
  font-family: var(--mono); font-size: 0.55rem; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--muted); background: none; border: none; cursor: pointer;
  padding: 0.2rem 0; margin-top: 0.35rem; transition: color 0.15s; display: block;
  text-decoration: underline; text-underline-offset: 3px;
}
.manual-toggle:hover { color: var(--text); }
.manual-form { display: none; border-top: 1px solid var(--border); padding-top: 0.6rem; margin-top: 0.4rem; }
.manual-form.visible { display: block; }
.manual-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; margin-bottom: 0.4rem; }
.manual-input {
  width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font-family: var(--mono); font-size: 0.75rem;
  padding: 0.4rem 0.6rem; outline: none; transition: border-color 0.15s;
}
.manual-input::placeholder { color: var(--muted); font-size: 0.68rem; }
.manual-input:focus { border-color: var(--border-hover); }
.manual-add-btn {
  width: 100%; background: var(--surface2); border: 1px solid var(--accent); border-radius: 6px; color: var(--accent);
  font-family: var(--mono); font-size: 0.65rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
  padding: 0.44rem; cursor: pointer; transition: all 0.15s;
}
.manual-add-btn:hover { background: var(--accent-dim); }

/* ── Sync Modal ── */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.78); z-index: 100;
  display: flex; align-items: center; justify-content: center; padding: 1.25rem;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.modal-backdrop.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); border: 1px solid var(--border-hover); border-radius: 10px;
  width: 100%; max-width: 380px; padding: 1.4rem;
  transform: translateY(12px); transition: transform 0.2s;
}
.modal-backdrop.open .modal { transform: translateY(0); }
.modal-title { font-size: 0.88rem; font-weight: 800; margin-bottom: 0.22rem; }
.modal-sub { font-family: var(--mono); font-size: 0.6rem; color: var(--muted); margin-bottom: 1.1rem; line-height: 1.55; }
.modal-section-label { font-family: var(--mono); font-size: 0.52rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.38rem; }
.sync-code-display {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
  padding: 0.65rem 0.85rem; margin-bottom: 0.5rem;
  display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
}
.sync-code-val { font-family: var(--mono); font-size: 1rem; font-weight: 600; color: var(--accent); letter-spacing: 0.1em; }
.sync-code-val.empty { color: var(--muted); font-size: 0.72rem; font-weight: 400; letter-spacing: 0.03em; }
.sync-action-btn {
  font-family: var(--mono); font-size: 0.56rem; letter-spacing: 0.05em; text-transform: uppercase;
  background: none; border: 1px solid var(--border); color: var(--muted);
  padding: 0.2rem 0.46rem; border-radius: 3px; cursor: pointer; transition: all 0.12s; white-space: nowrap;
}
.sync-action-btn:hover { border-color: var(--accent); color: var(--accent); }
.sync-divider { display: flex; align-items: center; gap: 0.6rem; margin: 0.9rem 0; }
.sync-divider::before, .sync-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.sync-divider span { font-family: var(--mono); font-size: 0.58rem; color: var(--muted); }
.sync-input-row { display: grid; grid-template-columns: 1fr auto; gap: 0.5rem; margin-bottom: 0.9rem; }
.sync-text-input {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font-family: var(--mono); font-size: 0.8rem; letter-spacing: 0.08em;
  padding: 0.48rem 0.65rem; outline: none; transition: border-color 0.15s; text-transform: uppercase;
}
.sync-text-input::placeholder { color: var(--muted); text-transform: none; letter-spacing: 0.02em; font-size: 0.7rem; }
.sync-text-input:focus { border-color: var(--border-hover); }
.sync-load-btn {
  background: var(--accent); border: none; border-radius: 6px; color: #0c0c0f;
  font-family: var(--mono); font-size: 0.66rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
  padding: 0.48rem 0.7rem; cursor: pointer; white-space: nowrap; transition: opacity 0.15s;
}
.sync-load-btn:hover { opacity: 0.88; }
.sync-load-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.sync-status { font-family: var(--mono); font-size: 0.62rem; min-height: 0.9rem; margin-bottom: 0.7rem; transition: color 0.2s; }
.sync-status.ok { color: var(--green); } .sync-status.err { color: var(--red); } .sync-status.info { color: var(--muted); }
.modal-footer { display: flex; justify-content: flex-end; gap: 0.5rem; border-top: 1px solid var(--border); padding-top: 0.85rem; }
.modal-close-btn {
  font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.05em; text-transform: uppercase;
  background: none; border: 1px solid var(--border); color: var(--muted);
  padding: 0.28rem 0.62rem; border-radius: 4px; cursor: pointer; transition: all 0.15s;
}
.modal-close-btn:hover { color: var(--text); border-color: var(--border-hover); }
.modal-push-btn {
  font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.05em; text-transform: uppercase;
  background: var(--accent-dim); border: 1px solid var(--accent); color: var(--accent);
  padding: 0.28rem 0.62rem; border-radius: 4px; cursor: pointer; transition: all 0.15s;
}
.modal-push-btn:hover { background: var(--accent); color: #0c0c0f; }
.modal-push-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── Desktop ≥ 860px ── */
@media (min-width: 860px) {
  body {
    max-width: none;
    display: grid;
    grid-template-columns: 1fr var(--sidebar);
    grid-template-rows: auto 1fr;
    grid-template-areas: "header header" "main sidebar";
    min-height: 100vh; padding: 0;
  }
  .header {
    grid-area: header; padding: 0.85rem 1.75rem 0.6rem;
    display: flex; align-items: center; gap: 2rem;
  }
  .header-top { margin-bottom: 0; flex-shrink: 0; }
  .summary { flex: 1; display: flex; gap: 0; border: none; }
  .summary-item { padding: 0 1.4rem 0 1.25rem; text-align: left; border-right: none !important; border-left: 1px solid var(--border); }
  .summary-item:first-child { border-left: none; padding-left: 0; }
  .summary-label { font-size: 0.5rem; }
  .summary-value { font-size: 0.9rem; }
  .header-btns { margin-left: auto; flex-shrink: 0; gap: 0.45rem; }
  .watchlist { grid-area: main; padding: 0; border-right: 1px solid var(--border); }
  .item-header { padding: 0.9rem 1.5rem 0.5rem; }
  .item-actions { padding: 0 1.5rem 0.6rem; }
  .item-name { font-size: 0.85rem; }
  .item-sub { font-size: 0.63rem; }
  .ticker-badge { font-size: 0.7rem; min-width: 56px; }
  .chart-inner { padding: 0 1.5rem 1rem; }
  .info-panel { padding: 0.9rem 1.5rem; }
  .markers-panel { padding: 0.8rem 1.5rem; }
  .manual-price-row { padding: 0.5rem 1.5rem; }
  .bottom-panel {
    grid-area: sidebar;
    position: sticky; top: var(--header-h);
    transform: none; left: auto;
    width: auto; max-width: none;
    height: calc(100vh - var(--header-h));
    border-top: none; border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: visible;
  }
  .panel-body { flex: 1; overflow-y: auto; padding: 1rem 1.25rem 1.25rem; }
  .search-input { font-size: 0.88rem; padding: 0.58rem 0.8rem; }
  .dropdown { bottom: auto; top: calc(100% + 4px); max-height: 300px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="logo">Watch<span class="dot">.</span><span class="refresh-dot"></span></div>
    </div>
  </div>
  <div class="summary">
    <div class="summary-item">
      <div class="summary-label">Positionen</div>
      <div class="summary-value" id="sumCount">–</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">Ø Rendite</div>
      <div class="summary-value" id="sumAvgRet">–</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">Beste</div>
      <div class="summary-value" id="sumBest">–</div>
    </div>
  </div>
  <div class="header-btns">
    <button class="hbtn" id="syncBtn" onclick="openSyncModal()">Sync</button>
    <button class="hbtn" id="reorderBtn" onclick="toggleReorderMode()">Ordnen</button>
    <button class="hbtn" onclick="resetConfirm()" style="color:var(--red);border-color:rgba(255,95,95,0.3)">Reset</button>
  </div>
</div>

<div class="watchlist" id="watchlist"></div>

<div class="modal-backdrop" id="syncModal" onclick="onBackdropClick(event)">
  <div class="modal">
    <div class="modal-title">Sync</div>
    <div class="modal-sub">Greife auf deine Watchlist von anderen Geräten zu – ohne Account.</div>
    <div class="modal-section-label">Dein Sync-Code</div>
    <div class="sync-code-display">
      <span class="sync-code-val" id="currentCodeDisplay">–</span>
      <div style="display:flex;gap:0.35rem;flex-shrink:0">
        <button class="sync-action-btn" onclick="generateCode()">Neu</button>
        <button class="sync-action-btn" id="copyCodeBtn" onclick="copyCode()" style="display:none">Kopieren</button>
      </div>
    </div>
    <div class="sync-divider"><span>oder vorhandenen Code laden</span></div>
    <div class="sync-input-row">
      <input class="sync-text-input" id="syncCodeInput" placeholder="z. B. WOLF-42-DELTA" maxlength="20" oninput="onSyncInputChange()" />
      <button class="sync-load-btn" id="loadBtn" onclick="loadFromCode()" disabled>Laden</button>
    </div>
    <div class="sync-status info" id="syncStatus"></div>
    <div class="modal-footer">
      <button class="modal-close-btn" onclick="closeSyncModal()">Schließen</button>
      <button class="modal-push-btn" id="pushBtn" onclick="pushToCloud()" disabled>Jetzt hochladen</button>
    </div>
  </div>
</div>

<div class="bottom-panel">
  <div class="panel-tabs">
    <button class="panel-tab active" id="tab-search" onclick="switchTab('search')">Suchen</button>
    <button class="panel-tab" id="tab-add" onclick="switchTab('add')">Hinzufügen</button>
  </div>
  <div class="panel-body" id="panel-search">
    <div class="search-wrap">
      <input class="search-input" id="searchInput" placeholder="Ticker oder Name (z. B. Apple, NVDA…)" autocomplete="off" oninput="onSearch(this.value)" onfocus="onSearchFocus()" />
      <div class="dropdown" id="searchDropdown"></div>
    </div>
    <div id="searchHint" style="font-family:var(--mono);font-size:0.6rem;color:var(--muted);padding:0.3rem 0;line-height:1.6;">Tippe einen Namen oder Ticker. Klicke auf ein Ergebnis, um es zur Watchlist hinzuzufügen oder den Kurs zu sehen.</div>
  </div>
  <div class="panel-body" id="panel-add" style="display:none">
    <div class="add-pill" id="addPill">
      <span class="add-pill-sym" id="pillSym"></span>
      <span class="add-pill-name" id="pillName"></span>
      <button class="add-pill-x" onclick="clearAddSelection()">×</button>
    </div>
    <button class="add-watch-btn" id="addWatchBtn" onclick="addToWatchlist()" disabled>+ Zur Watchlist</button>
    <button class="manual-toggle" onclick="toggleManualForm()">+ Manuell erfassen</button>
    <div class="manual-form" id="manualForm">
      <div class="manual-grid">
        <input class="manual-input" id="manualTicker" placeholder="Ticker (NESN)" maxlength="12" />
        <input class="manual-input" id="manualName" placeholder="Name (Nestlé)" />
      </div>
      <div class="manual-grid">
        <input class="manual-input" id="manualPrice" type="number" placeholder="Kurs CHF" min="0.01" step="any" />
        <input class="manual-input" id="manualCurrency" placeholder="Währung (CHF)" maxlength="5" />
      </div>
      <button class="manual-add-btn" onclick="addManual()">Manuell hinzufügen</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
<script>
const API = 'https://stock-worker.stock-worker.workers.dev';
const SK = 'watchlist_v1';
const SYNC_CODE_KEY = 'watchlist_sync_code';

/* ── State ── */
let state = loadState();
let fxRate = null;
let reorderMode = false;
let selectedAddTicker = null;
let searchTimeout = null;
let searchResults = [];
let charts = {};
let priceCache = {};
let infoCache = {};
let dragSrc = null;

function defaultState() { return { items: [], order: [] }; }
function loadState() {
  try { const r = localStorage.getItem(SK); if (r) return JSON.parse(r); } catch(e) {}
  return defaultState();
}
function save() { localStorage.setItem(SK, JSON.stringify(state)); }

function resetConfirm() {
  if (!confirm('Watchlist wirklich zurücksetzen?')) return;
  localStorage.removeItem(SK); state = defaultState();
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e){} });
  charts = {}; priceCache = {}; infoCache = {};
  silentPush(); renderAll();
}

/* ── FX ── */
async function getFxRate() {
  try { const r = await fetch(API + '/api/fx'); const d = await r.json(); fxRate = d.rate; }
  catch(e) { fxRate = 0.9; }
}
function toChf(price, currency) {
  if (currency === 'CHF') return price;
  if (!fxRate) return price;
  if (currency === 'USD') return price * fxRate;
  if (currency === 'EUR') return price * fxRate * 1.05;
  return price * fxRate;
}

/* ── Formatting ── */
function fmtNum(v, d=2) { return v.toLocaleString('de-CH', { minimumFractionDigits: d, maximumFractionDigits: d }); }
function fmtChf(v) { return 'CHF\u00a0' + fmtNum(v); }
function fmtPct(v, plus=true) { return (plus && v >= 0 ? '+' : '') + v.toFixed(2) + '%'; }
function pnlClass(v) { return Math.abs(v) < 0.005 ? 'flat' : v > 0 ? 'up' : 'down'; }
function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('de-CH', { day:'2-digit', month:'2-digit', year:'2-digit' });
}
function fmtLargeNum(v) {
  if (!v || isNaN(v)) return '–';
  if (v >= 1e12) return fmtNum(v/1e12, 2) + ' T';
  if (v >= 1e9)  return fmtNum(v/1e9,  2) + ' Mrd';
  if (v >= 1e6)  return fmtNum(v/1e6,  2) + ' Mio';
  return fmtNum(v, 0);
}

/* ── Price fetching ── */
async function fetchPrice(symbol) {
  if (priceCache[symbol] && Date.now() - priceCache[symbol].ts < 60000) return priceCache[symbol].data;
  try {
    const r = await fetch(API + '/api/quote?symbol=' + encodeURIComponent(symbol));
    const d = await r.json();
    priceCache[symbol] = { ts: Date.now(), data: d };
    return d;
  } catch(e) { return null; }
}

async function refreshPrices() {
  const nonManual = state.items.filter(i => !i.manual);
  for (const item of nonManual) {
    const q = await fetchPrice(item.symbol);
    if (q && q.price) {
      item.currentPrice = q.price;
      item.currency = q.currency;
      item.changePercent = q.changePercent || item.changePercent;
      item.change = q.change || item.change;
    }
  }
  save(); renderAll();
}

/* ── Ordered items ── */
function orderedItems() {
  const order = state.order || [];
  const map = {};
  state.items.forEach(i => map[i.symbol] = i);
  const result = [];
  order.forEach(sym => { if (map[sym]) { result.push(map[sym]); delete map[sym]; } });
  Object.values(map).forEach(i => result.push(i));
  return result;
}

/* ── Render all ── */
function renderAll() { updateSummary(); renderWatchlist(); }

function updateSummary() {
  const items = state.items;
  document.getElementById('sumCount').textContent = items.length || '–';

  // Use changePercent for avg; filter markers for return
  const withChange = items.filter(i => i.changePercent != null);
  let avgRet = '–';
  if (withChange.length) {
    const avg = withChange.reduce((s, i) => s + i.changePercent, 0) / withChange.length;
    const el = document.getElementById('sumAvgRet');
    el.textContent = fmtPct(avg);
    el.style.color = Math.abs(avg) < 0.005 ? 'var(--muted)' : avg > 0 ? 'var(--green)' : 'var(--red)';
  } else {
    document.getElementById('sumAvgRet').textContent = '–';
    document.getElementById('sumAvgRet').style.color = 'var(--muted)';
  }

  if (withChange.length) {
    const best = withChange.reduce((b, i) => i.changePercent > b.changePercent ? i : b, withChange[0]);
    const el = document.getElementById('sumBest');
    el.textContent = best.symbol;
    el.style.color = 'var(--green)';
  } else { document.getElementById('sumBest').textContent = '–'; document.getElementById('sumBest').style.color = 'var(--muted)'; }
}

function renderWatchlist() {
  const list = document.getElementById('watchlist');
  const items = orderedItems();
  if (!items.length) {
    list.innerHTML = '<div class="empty-state"><strong>Watchlist leer</strong>Suche nach Aktien und füge sie hier hinzu.</div>';
    return;
  }

  // Remove stale DOM
  [...list.querySelectorAll('.watch-item')].forEach(el => {
    if (!items.find(i => i.symbol === el.dataset.sym)) {
      el.style.transition = 'opacity 0.2s'; el.style.opacity = '0';
      setTimeout(() => el.remove(), 220);
    }
  });

  items.forEach((item, idx) => {
    const price = item.currentPrice || 0;
    const priceChf = toChf(price, item.currency);
    const chg = item.changePercent || 0;
    const chgAbs = item.change || 0;
    const existing = document.getElementById('wi-' + item.symbol);

    if (existing) {
      // Update price
      existing.querySelector('.item-price').textContent = price > 0 ? fmtChf(toChf(price, item.currency)) : '–';
      const cel = existing.querySelector('.item-change');
      cel.textContent = price > 0 ? fmtPct(chg) + ' (' + (chgAbs >= 0 ? '+' : '') + fmtNum(toChf(chgAbs, item.currency)) + ')' : '';
      cel.className = 'item-change ' + pnlClass(chg);
      // Update sub line (marker return if exists)
      existing.querySelector('.item-sub').textContent = buildSubLine(item);
      return;
    }

    const div = document.createElement('div');
    div.className = 'watch-item' + (reorderMode ? '' : '');
    div.id = 'wi-' + item.symbol;
    div.dataset.sym = item.symbol;
    div.style.animationDelay = (idx * 0.04) + 's';
    div.innerHTML = buildItemHtml(item);
    list.appendChild(div);
    if (reorderMode) setupDragListeners(div);
  });

  if (reorderMode) list.classList.add('reorder-mode');
  else list.classList.remove('reorder-mode');
}

function buildSubLine(item) {
  const markers = item.markers || [];
  if (!markers.length) {
    return item.currency ? item.currency + (item.exchange ? ' · ' + item.exchange : '') : '';
  }
  // Best marker return
  const cur = item.currentPrice || 0;
  let totalInvested = 0, totalCurrentValue = 0;
  for (const m of markers) {
    const shares = m.amount / m.buyPrice;
    totalInvested += m.amount;
    totalCurrentValue += shares * cur;
  }
  if (!totalInvested) return item.currency || '';
  const totalRet = ((totalCurrentValue - totalInvested) / totalInvested) * 100;
  const sign = totalRet >= 0 ? '+' : '';
  return sign + totalRet.toFixed(2) + '% Rendite · ' + fmtChf(totalCurrentValue - totalInvested);
}

function buildItemHtml(item) {
  const price = item.currentPrice || 0;
  const priceChf = toChf(price, item.currency);
  const chg = item.changePercent || 0;
  const chgAbs = item.change || 0;
  const isManual = !!item.manual;

  return `
    <div class="item-header" onclick="toggleItemSections('${item.symbol}', event)">
      <span class="drag-handle" title="Verschieben">⠿</span>
      <div class="ticker-badge ${isManual ? 'manual' : ''}">${item.symbol}</div>
      <div>
        <div class="item-name">${item.name}</div>
        <div class="item-sub">${buildSubLine(item)}</div>
      </div>
      <div class="item-price-badge">
        <div class="item-price">${price > 0 ? fmtChf(priceChf) : '–'}</div>
        <div class="item-change ${pnlClass(chg)}">${price > 0 ? fmtPct(chg) + ' (' + (chgAbs >= 0 ? '+' : '') + fmtNum(toChf(chgAbs, item.currency)) + ')' : ''}</div>
      </div>
    </div>
    <div class="item-actions">
      ${!isManual ? `<button class="action-btn" id="infoBtn-${item.symbol}" onclick="toggleInfo('${item.symbol}', event)">ℹ Info</button>` : ''}
      <button class="action-btn" id="markerBtn-${item.symbol}" onclick="toggleMarkers('${item.symbol}', event)">◎ Marker</button>
      ${isManual ? `<button class="action-btn" id="priceBtn-${item.symbol}" onclick="toggleManualPrice('${item.symbol}', event)">Kurs setzen</button>` : ''}
      <button class="action-btn danger" onclick="removeItem('${item.symbol}')">✕ Entfernen</button>
    </div>
    <div class="expand-section" id="info-section-${item.symbol}">
      <div class="info-panel" id="info-panel-${item.symbol}">
        <div class="info-loading">Lade Daten…</div>
      </div>
    </div>
    <div class="expand-section" id="markers-section-${item.symbol}">
      <div class="markers-panel" id="markers-panel-${item.symbol}">${buildMarkersHtml(item)}</div>
    </div>
    ${isManual ? `
    <div class="expand-section" id="price-section-${item.symbol}">
      <div class="manual-price-row">
        <span class="manual-price-label">Kurs aktualisieren:</span>
        <input class="manual-price-input" id="manualCurPrice-${item.symbol}" type="number" placeholder="${fmtNum(item.currentPrice || 0)}" min="0.01" step="any" />
        <button class="manual-price-btn" onclick="updateManualPrice('${item.symbol}')">Setzen</button>
      </div>
    </div>` : ''}
    <div class="expand-section" id="chart-section-${item.symbol}">
      <div class="chart-inner">
        <div class="chart-tabs" id="tabs-${item.symbol}">
          <button class="chart-tab active" onclick="loadChart('${item.symbol}','1d',this)">1T</button>
          <button class="chart-tab" onclick="loadChart('${item.symbol}','5d',this)">5T</button>
          <button class="chart-tab" onclick="loadChart('${item.symbol}','1mo',this)">1M</button>
          <button class="chart-tab" onclick="loadChart('${item.symbol}','3mo',this)">3M</button>
          <button class="chart-tab" onclick="loadChart('${item.symbol}','1y',this)">1J</button>
          <button class="chart-tab" onclick="loadChart('${item.symbol}','5y',this)">5J</button>
          <button class="chart-tab" onclick="loadChart('${item.symbol}','max',this)">Max</button>
        </div>
        <div class="chart-canvas-wrap">
          <div class="chart-loading" id="loading-${item.symbol}">laden…</div>
          <canvas id="canvas-${item.symbol}" height="150"></canvas>
        </div>
      </div>
    </div>`;
}

/* ── Toggle sections ── */
function toggleItemSections(sym, event) {
  if (reorderMode) return;
  if (event && event.target.closest('.action-btn, .marker-del-btn, .manual-price-btn, .chart-tab, .marker-add-btn, .marker-input, .manual-price-input')) return;
  const chartSec = document.getElementById('chart-section-' + sym);
  if (!chartSec) return;
  const wasOpen = chartSec.classList.contains('open');
  chartSec.classList.toggle('open');
  const item = state.items.find(i => i.symbol === sym);
  if (!wasOpen && item && !item.manual) loadChart(sym, '1d', document.querySelector('#tabs-' + sym + ' .chart-tab'));
}

function toggleInfo(sym, event) {
  if (event) event.stopPropagation();
  const sec = document.getElementById('info-section-' + sym);
  const btn = document.getElementById('infoBtn-' + sym);
  const isOpen = sec.classList.contains('open');
  sec.classList.toggle('open');
  if (btn) btn.classList.toggle('info-active', !isOpen);
  if (!isOpen) loadInfo(sym);
}

function toggleMarkers(sym, event) {
  if (event) event.stopPropagation();
  const sec = document.getElementById('markers-section-' + sym);
  const btn = document.getElementById('markerBtn-' + sym);
  const isOpen = sec.classList.contains('open');
  sec.classList.toggle('open');
  if (btn) btn.classList.toggle('marker-active', !isOpen);
}

function toggleManualPrice(sym, event) {
  if (event) event.stopPropagation();
  const sec = document.getElementById('price-section-' + sym);
  if (sec) sec.classList.toggle('open');
}

/* ── Info panel ── */
async function loadInfo(sym) {
  const panel = document.getElementById('info-panel-' + sym);
  if (!panel) return;
  if (infoCache[sym]) { panel.innerHTML = buildInfoHtml(infoCache[sym]); return; }
  panel.innerHTML = '<div class="info-loading">Lade Daten…</div>';
  try {
    // Use the quote endpoint for detailed info
    const q = await fetchPrice(sym);
    if (!q) throw new Error('no data');
    infoCache[sym] = q;
    panel.innerHTML = buildInfoHtml(q);
  } catch(e) {
    panel.innerHTML = '<div class="info-loading">Keine Daten verfügbar.</div>';
  }
}

function buildInfoHtml(q) {
  const safe = (v, fmt) => (v != null && v !== 0 && !isNaN(v)) ? fmt(v) : '–';
  return `
    <div class="info-grid">
      <div><div class="info-label">Kurs (live)</div><div class="info-val">${safe(q.price, v => fmtChf(toChf(v, q.currency)))}</div></div>
      <div><div class="info-label">Veränderung</div><div class="info-val ${pnlClass(q.changePercent || 0)}">${safe(q.changePercent, v => fmtPct(v))}</div></div>
      <div><div class="info-label">52W Hoch</div><div class="info-val">${safe(q.fiftyTwoWeekHigh, v => fmtChf(toChf(v, q.currency)))}</div></div>
      <div><div class="info-label">52W Tief</div><div class="info-val">${safe(q.fiftyTwoWeekLow, v => fmtChf(toChf(v, q.currency)))}</div></div>
      <div><div class="info-label">Marktkapitalisierung</div><div class="info-val">${safe(q.marketCap, fmtLargeNum)}</div></div>
      <div><div class="info-label">KGV (PE Ratio)</div><div class="info-val">${safe(q.trailingPE, v => fmtNum(v, 1))}</div></div>
      <div><div class="info-label">Dividendenrendite</div><div class="info-val">${safe(q.dividendYield, v => fmtPct(v*100, false))}</div></div>
      <div><div class="info-label">Volumen</div><div class="info-val">${safe(q.volume, fmtLargeNum)}</div></div>
    </div>
    <div class="info-sep"></div>
    <div class="info-grid-3">
      <div><div class="info-label">Börse</div><div class="info-val">${q.exchange || '–'}</div></div>
      <div><div class="info-label">Währung</div><div class="info-val">${q.currency || '–'}</div></div>
      <div><div class="info-label">Sektor</div><div class="info-val" style="font-size:0.6rem;white-space:normal;line-height:1.35">${q.sector || q.industry || '–'}</div></div>
    </div>
    ${q.shortName || q.longName ? `<div class="info-sep"></div><div class="info-desc">${q.longName || q.shortName}</div>` : ''}`;
}

/* ── Markers ── */
function buildMarkersHtml(item) {
  const markers = item.markers || [];
  const cur = item.currentPrice || 0;
  return `
    <div class="markers-title">Meine Einstiege · ${item.symbol}</div>
    <div class="marker-list">
      ${markers.length ? markers.map(m => {
        const shares = m.amount / m.buyPrice;
        const curVal = shares * cur;
        const ret = cur > 0 ? ((cur - m.buyPrice) / m.buyPrice) * 100 : 0;
        const pnlAbs = curVal - m.amount;
        return `
          <div class="marker-row">
            <div>
              <div class="marker-info">${fmtNum(shares, 4)} @ CHF ${fmtNum(m.buyPrice)}</div>
              <div class="marker-date">${fmtDate(m.at)}</div>
            </div>
            <div class="marker-val">${cur > 0 ? fmtChf(curVal) : '–'}</div>
            <div class="marker-ret ${pnlClass(ret)}">${cur > 0 ? fmtPct(ret) : '–'}</div>
            <button class="marker-del-btn" onclick="deleteMarker('${item.symbol}','${m.id}')">✕</button>
          </div>`;
      }).join('') : '<div class="marker-date" style="padding:0.3rem 0;color:var(--muted)">Noch keine Einstiege erfasst.</div>'}
    </div>
    <div class="add-marker-form">
      <div class="marker-form-title">Einstieg hinzufügen</div>
      <div class="marker-grid">
        <input class="marker-input" id="mkBuyPrice-${item.symbol}" type="number" placeholder="Kaufkurs (CHF)" min="0.01" step="any" />
        <input class="marker-input" id="mkAmount-${item.symbol}" type="number" placeholder="Investiert (CHF)" min="1" step="any" />
      </div>
      <button class="marker-add-btn" onclick="addMarker('${item.symbol}')">+ Einstieg erfassen</button>
    </div>`;
}

function addMarker(sym) {
  const item = state.items.find(i => i.symbol === sym);
  if (!item) return;
  const buyPrice = parseFloat(document.getElementById('mkBuyPrice-' + sym)?.value);
  const amount   = parseFloat(document.getElementById('mkAmount-' + sym)?.value);
  if (!buyPrice || !amount || buyPrice <= 0 || amount <= 0) { alert('Kaufkurs und Betrag angeben.'); return; }
  if (!item.markers) item.markers = [];
  item.markers.push({ id: Date.now().toString(), buyPrice, amount, at: new Date().toISOString() });
  save(); silentPush();
  // Refresh markers panel
  const panel = document.getElementById('markers-panel-' + sym);
  if (panel) panel.innerHTML = buildMarkersHtml(item);
  // Clear inputs
  const bp = document.getElementById('mkBuyPrice-' + sym);
  const am = document.getElementById('mkAmount-' + sym);
  if (bp) bp.value = ''; if (am) am.value = '';
  // Refresh sub line
  const subEl = document.querySelector('#wi-' + sym + ' .item-sub');
  if (subEl) subEl.textContent = buildSubLine(item);
  updateSummary();
}

function deleteMarker(sym, markerId) {
  const item = state.items.find(i => i.symbol === sym);
  if (!item || !item.markers) return;
  item.markers = item.markers.filter(m => m.id !== markerId);
  save(); silentPush();
  const panel = document.getElementById('markers-panel-' + sym);
  if (panel) panel.innerHTML = buildMarkersHtml(item);
  const subEl = document.querySelector('#wi-' + sym + ' .item-sub');
  if (subEl) subEl.textContent = buildSubLine(item);
  updateSummary();
}

/* ── Manual price ── */
function updateManualPrice(sym) {
  const input = document.getElementById('manualCurPrice-' + sym);
  const val = parseFloat(input?.value);
  if (!val || val <= 0) return;
  const item = state.items.find(i => i.symbol === sym);
  if (!item) return;
  item.currentPrice = val;
  if (input) input.value = '';
  save(); silentPush();
  // Close section
  const sec = document.getElementById('price-section-' + sym);
  if (sec) sec.classList.remove('open');
  renderAll();
}

/* ── Chart ── */
function intervalForRange(r) {
  return {'1d':'5m','5d':'30m','1mo':'1d','3mo':'1d','1y':'1wk','5y':'1mo','max':'3mo'}[r] || '1d';
}

async function loadChart(sym, range, tabEl) {
  const tabs = document.querySelectorAll('#tabs-' + sym + ' .chart-tab');
  tabs.forEach(t => t.classList.remove('active'));
  if (tabEl) tabEl.classList.add('active');
  const loading = document.getElementById('loading-' + sym);
  const canvas  = document.getElementById('canvas-' + sym);
  if (!canvas) return;
  loading.style.display = 'flex'; loading.textContent = 'laden…'; canvas.style.display = 'none';
  if (charts[sym]) { try { charts[sym].destroy(); } catch(e){} delete charts[sym]; }
  const interval = intervalForRange(range);
  try {
    const r = await fetch(API + '/api/chart?symbol=' + encodeURIComponent(sym) + '&range=' + range + '&interval=' + interval);
    const d = await r.json();
    if (!d.points || !d.points.length) throw new Error('no data');
    const item = state.items.find(i => i.symbol === sym);
    const currency = item ? item.currency : 'USD';
    const labels = d.points.map(p => {
      const dt = new Date(p.time * 1000);
      if (range === '1d') return dt.toLocaleTimeString('de-CH', { hour:'2-digit', minute:'2-digit' });
      if (range === '5d') return dt.toLocaleDateString('de-CH', { weekday:'short' }) + ' ' + dt.toLocaleTimeString('de-CH', { hour:'2-digit', minute:'2-digit' });
      if (range === '5y' || range === 'max') return dt.toLocaleDateString('de-CH', { year:'2-digit', month:'short' });
      return dt.toLocaleDateString('de-CH', { month:'short', day:'numeric' });
    });
    const values = d.points.map(p => toChf(p.value, currency));
    const isUp = values[values.length-1] >= values[0];
    const color = isUp ? '#5dca8c' : '#ff5f5f';

    // Marker annotations
    const annotations = {};
    if (item && item.markers) {
      item.markers.forEach((m, idx) => {
        const buyTime = new Date(m.at).getTime();
        let closestIdx = 0, minDiff = Infinity;
        d.points.forEach((p, i) => { const diff = Math.abs(p.time*1000 - buyTime); if (diff < minDiff) { minDiff = diff; closestIdx = i; }});
        annotations['marker_' + idx] = {
          type: 'line', xMin: closestIdx, xMax: closestIdx,
          borderColor: 'rgba(200,240,96,0.7)', borderWidth: 1.5, borderDash: [3,3],
          label: {
            display: true, content: 'CHF ' + fmtNum(m.buyPrice), position: 'start',
            backgroundColor: 'rgba(12,12,15,0.85)', color: '#c8f060',
            font: { family:"'Syne Mono',monospace", size:9 },
            padding: { top:2, bottom:2, left:4, right:4 }, borderRadius: 3, yAdjust: 6
          }
        };
      });
    }

    loading.style.display = 'none'; canvas.style.display = 'block';
    charts[sym] = new Chart(canvas, {
      type: 'line',
      data: { labels, datasets: [{
        data: values, borderColor: color, borderWidth: 1.5, pointRadius: 0, fill: true,
        backgroundColor: ctx => {
          const g2 = ctx.chart.ctx.createLinearGradient(0,0,0,150);
          g2.addColorStop(0, isUp ? 'rgba(93,202,140,0.18)' : 'rgba(255,95,95,0.18)');
          g2.addColorStop(1, 'rgba(0,0,0,0)'); return g2;
        }, tension: 0.3
      }]},
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 450, easing: 'easeOutQuart' },
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          annotation: { annotations },
          tooltip: {
            backgroundColor: '#1c1c22', borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1,
            titleColor: '#888880', bodyColor: '#f0ede8',
            titleFont: { family:"'Syne Mono',monospace", size:9 },
            bodyFont:  { family:"'Syne Mono',monospace", size:10 },
            callbacks: { label: ctx => fmtChf(ctx.raw) }
          }
        },
        scales: {
          x: { grid:{display:false}, border:{display:false},
            ticks:{color:'#888880', font:{family:"'Syne Mono',monospace",size:8}, maxTicksLimit:5, maxRotation:0} },
          y: { position:'right', border:{display:false}, grid:{color:'rgba(255,255,255,0.04)'},
            ticks:{color:'#888880', font:{family:"'Syne Mono',monospace",size:8}, maxTicksLimit:4, callback:v=>v.toFixed(0)} }
        }
      }
    });
  } catch(e) {
    loading.textContent = 'Keine Daten'; loading.style.display = 'flex'; canvas.style.display = 'none';
  }
}

/* ── Add to watchlist ── */
function addToWatchlist() {
  if (!selectedAddTicker) return;
  if (state.items.find(i => i.symbol === selectedAddTicker.symbol)) {
    alert(selectedAddTicker.symbol + ' ist bereits in der Watchlist.');
    return;
  }
  const item = {
    symbol: selectedAddTicker.symbol,
    name: selectedAddTicker.name,
    currency: selectedAddTicker.currency || 'USD',
    exchange: selectedAddTicker.exchange || '',
    currentPrice: selectedAddTicker.price || 0,
    changePercent: selectedAddTicker.changePercent || 0,
    change: selectedAddTicker.change || 0,
    markers: [],
    addedAt: new Date().toISOString()
  };
  state.items.push(item);
  if (!state.order) state.order = [];
  state.order.push(item.symbol);
  save(); silentPush();
  clearAddSelection();
  document.getElementById('positionsList') && (document.getElementById('positionsList').innerHTML = '');
  renderAll();
}

function addManual() {
  const ticker   = document.getElementById('manualTicker').value.trim().toUpperCase();
  const name     = document.getElementById('manualName').value.trim();
  const price    = parseFloat(document.getElementById('manualPrice').value);
  const currency = document.getElementById('manualCurrency').value.trim().toUpperCase() || 'CHF';
  if (!ticker || !name || !price) { alert('Ticker, Name und Kurs angeben.'); return; }
  if (state.items.find(i => i.symbol === ticker)) { alert(ticker + ' ist bereits in der Watchlist.'); return; }
  const item = { symbol: ticker, name, currency, exchange: '', currentPrice: price, changePercent: 0, change: 0, markers: [], manual: true, addedAt: new Date().toISOString() };
  state.items.push(item);
  if (!state.order) state.order = [];
  state.order.push(ticker);
  save(); silentPush();
  ['manualTicker','manualName','manualPrice','manualCurrency'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('manualForm').classList.remove('visible');
  renderAll();
}

function removeItem(sym) {
  state.items = state.items.filter(i => i.symbol !== sym);
  if (state.order) state.order = state.order.filter(s => s !== sym);
  if (charts[sym]) { try { charts[sym].destroy(); } catch(e){} delete charts[sym]; }
  delete infoCache[sym]; delete priceCache[sym];
  const el = document.getElementById('wi-' + sym);
  if (el) { el.style.transition = 'opacity 0.2s'; el.style.opacity = '0'; setTimeout(() => el.remove(), 220); }
  save(); silentPush(); updateSummary();
}

/* ── Search ── */
async function onSearch(q) {
  clearTimeout(searchTimeout);
  const hint = document.getElementById('searchHint');
  if (q.length < 2) { closeDropdown(); if (hint) hint.style.display = 'block'; return; }
  if (hint) hint.style.display = 'none';
  const dd = document.getElementById('searchDropdown');
  dd.innerHTML = '<div class="dd-loading">Suche…</div>'; dd.classList.add('visible');
  searchTimeout = setTimeout(async () => {
    try {
      const r = await fetch(API + '/api/search?q=' + encodeURIComponent(q));
      searchResults = await r.json();
      // Enrich with live prices in parallel (best effort)
      renderSearchDropdown(searchResults);
      // Attempt price enrichment
      enrichSearchResults(searchResults);
    } catch(e) { dd.innerHTML = '<div class="dd-loading">Fehler.</div>'; }
  }, 300);
}

async function enrichSearchResults(results) {
  // Fetch prices for top 5 results in background
  const top5 = results.slice(0, 5);
  await Promise.allSettled(top5.map(async (r) => {
    const q = await fetchPrice(r.symbol);
    if (q && q.price) {
      r.price = q.price; r.currency = q.currency;
      r.changePercent = q.changePercent; r.change = q.change;
    }
  }));
  renderSearchDropdown(results);
}

function renderSearchDropdown(results) {
  const dd = document.getElementById('searchDropdown');
  if (!results.length) { dd.classList.remove('visible'); return; }
  dd.innerHTML = results.map((r, i) => {
    const inList = state.items.find(it => it.symbol === r.symbol);
    const priceStr = r.price ? fmtChf(toChf(r.price, r.currency)) : '';
    const chgStr = r.changePercent != null ? fmtPct(r.changePercent) : '';
    const chgClass = r.changePercent != null ? pnlClass(r.changePercent) : '';
    return `
      <div class="dropdown-item" onclick="onSearchItemClick(${i})">
        <span class="dd-sym">${r.symbol}${inList ? ' ✓' : ''}</span>
        <div><div class="dd-name">${r.name}</div><div class="dd-exch">${r.exchange||''}</div></div>
        <div class="dd-right">
          ${priceStr ? `<div class="dd-price">${priceStr}</div>` : ''}
          ${chgStr ? `<div class="dd-change ${chgClass}">${chgStr}</div>` : ''}
        </div>
      </div>`;
  }).join('');
  dd.classList.add('visible');
}

function onSearchItemClick(i) {
  const r = searchResults[i];
  const inList = state.items.find(it => it.symbol === r.symbol);
  if (inList) {
    closeDropdown();
    // Scroll to item
    const el = document.getElementById('wi-' + r.symbol);
    if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
    return;
  }
  // Pre-select for adding
  selectedAddTicker = r;
  switchTab('add');
  document.getElementById('pillSym').textContent = r.symbol;
  document.getElementById('pillName').textContent = r.name;
  document.getElementById('addPill').classList.add('visible');
  document.getElementById('addWatchBtn').disabled = false;
  closeDropdown();
  document.getElementById('searchInput').value = '';
}

function closeDropdown() { document.getElementById('searchDropdown').classList.remove('visible'); }
function onSearchFocus() { if (searchResults.length) renderSearchDropdown(searchResults); }
function clearAddSelection() {
  selectedAddTicker = null;
  document.getElementById('addPill').classList.remove('visible');
  document.getElementById('addWatchBtn').disabled = true;
}
function toggleManualForm() { document.getElementById('manualForm').classList.toggle('visible'); }

function switchTab(tab) {
  document.getElementById('panel-search').style.display = tab === 'search' ? 'block' : 'none';
  document.getElementById('panel-add').style.display    = tab === 'add' ? 'block' : 'none';
  document.getElementById('tab-search').classList.toggle('active', tab === 'search');
  document.getElementById('tab-add').classList.toggle('active', tab === 'add');
}

document.addEventListener('click', e => { if (!e.target.closest('.search-wrap')) closeDropdown(); });

/* ── Reorder / Drag & Drop ── */
function toggleReorderMode() {
  reorderMode = !reorderMode;
  const btn = document.getElementById('reorderBtn');
  btn.classList.toggle('reorder-active', reorderMode);
  btn.textContent = reorderMode ? 'Fertig' : 'Ordnen';
  const list = document.getElementById('watchlist');
  list.classList.toggle('reorder-mode', reorderMode);
  if (reorderMode) {
    [...list.querySelectorAll('.watch-item')].forEach(setupDragListeners);
  } else {
    [...list.querySelectorAll('.watch-item')].forEach(el => {
      el.removeAttribute('draggable');
      el.ondragstart = el.ondragend = el.ondragover = el.ondrop = null;
    });
    // Save new order
    state.order = [...list.querySelectorAll('.watch-item')].map(el => el.dataset.sym);
    save(); silentPush();
  }
}

function setupDragListeners(el) {
  el.setAttribute('draggable', 'true');
  el.ondragstart = e => {
    dragSrc = el; el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', el.dataset.sym);
  };
  el.ondragend = e => { el.classList.remove('dragging'); clearDragOver(); };
  el.ondragover = e => {
    e.preventDefault(); e.dataTransfer.dropEffect = 'move';
    clearDragOver();
    if (el !== dragSrc) el.classList.add('drag-over');
  };
  el.ondrop = e => {
    e.preventDefault();
    if (dragSrc && dragSrc !== el) {
      const list = document.getElementById('watchlist');
      const children = [...list.querySelectorAll('.watch-item')];
      const srcIdx = children.indexOf(dragSrc);
      const tgtIdx = children.indexOf(el);
      if (srcIdx < tgtIdx) list.insertBefore(dragSrc, el.nextSibling);
      else list.insertBefore(dragSrc, el);
    }
    clearDragOver();
  };
}

function clearDragOver() {
  document.querySelectorAll('.watch-item.drag-over').forEach(el => el.classList.remove('drag-over'));
}

/* ── Sync ── */
const ADJECTIVES = ['WOLF','HAWK','LYNX','BEAR','BULL','STAG','IBIS','CROW','KITE','WREN','PIKE','JADE','ONYX','NOVA','ZETA'];
const NOUNS      = ['DELTA','SIGMA','ALPHA','OMEGA','PRIME','NEXUS','ATLAS','ORBIT','FORGE','ZENITH'];
function generateSyncCode() {
  return ADJECTIVES[Math.floor(Math.random()*ADJECTIVES.length)] + '-' + (10+Math.floor(Math.random()*90)) + '-' + NOUNS[Math.floor(Math.random()*NOUNS.length)];
}
function getSavedCode() { return localStorage.getItem(SYNC_CODE_KEY) || null; }
function setSavedCode(code) { localStorage.setItem(SYNC_CODE_KEY, code); }

async function silentPush() {
  const code = getSavedCode(); if (!code) return;
  try { await fetch(API + '/api/sync?code=' + encodeURIComponent(code), { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(state) }); } catch(e) {}
}

async function autoPullOnLoad() {
  const code = getSavedCode(); if (!code) return;
  try {
    const res = await fetch(API + '/api/sync?code=' + encodeURIComponent(code));
    if (!res.ok) return;
    const remote = await res.json();
    if (!remote.items) return;
    const remoteCount = remote.items?.length || 0;
    const localCount  = state.items?.length || 0;
    if (remoteCount > localCount) { state = remote; save(); renderAll(); }
  } catch(e) {}
}

function openSyncModal() { document.getElementById('syncModal').classList.add('open'); refreshSyncModalUI(); }
function closeSyncModal() { document.getElementById('syncModal').classList.remove('open'); setSyncStatus('',''); }
function onBackdropClick(e) { if (e.target === document.getElementById('syncModal')) closeSyncModal(); }

function refreshSyncModalUI() {
  const code = getSavedCode();
  const display = document.getElementById('currentCodeDisplay');
  const copyBtn = document.getElementById('copyCodeBtn');
  const pushBtn = document.getElementById('pushBtn');
  const syncBtn = document.getElementById('syncBtn');
  if (code) {
    display.textContent = code; display.className = 'sync-code-val';
    copyBtn.style.display = 'inline-block'; pushBtn.disabled = false;
    syncBtn.classList.add('active-sync');
  } else {
    display.textContent = 'Noch kein Code'; display.className = 'sync-code-val empty';
    copyBtn.style.display = 'none'; pushBtn.disabled = true;
    syncBtn.classList.remove('active-sync');
  }
}
function generateCode() { setSavedCode(generateSyncCode()); refreshSyncModalUI(); setSyncStatus('Code generiert — jetzt hochladen.', 'info'); }
function copyCode() {
  const code = getSavedCode(); if (!code) return;
  navigator.clipboard.writeText(code).then(() => { setSyncStatus('Code kopiert!', 'ok'); setTimeout(() => setSyncStatus('','info'), 2000); });
}
function onSyncInputChange() { document.getElementById('loadBtn').disabled = document.getElementById('syncCodeInput').value.trim().length < 5; setSyncStatus('','info'); }
function setSyncStatus(msg, type) { const el = document.getElementById('syncStatus'); el.textContent = msg; el.className = 'sync-status ' + (type || 'info'); }

async function pushToCloud() {
  const code = getSavedCode(); if (!code) return;
  const btn = document.getElementById('pushBtn');
  btn.disabled = true; btn.textContent = 'Lädt…'; setSyncStatus('Verbinde…', 'info');
  try {
    const res = await fetch(API + '/api/sync?code=' + encodeURIComponent(code), { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(state) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    setSyncStatus('✓ Hochgeladen — ' + new Date().toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'}), 'ok');
  } catch(e) { setSyncStatus('Fehler. Worker erreichbar?', 'err'); }
  finally { btn.disabled = false; btn.textContent = 'Jetzt hochladen'; }
}

async function loadFromCode() {
  const raw = document.getElementById('syncCodeInput').value.trim().toUpperCase();
  if (!raw) return;
  const btn = document.getElementById('loadBtn');
  btn.disabled = true; btn.textContent = 'Lädt…'; setSyncStatus('Suche Watchlist…', 'info');
  try {
    const res = await fetch(API + '/api/sync?code=' + encodeURIComponent(raw));
    if (res.status === 404) { setSyncStatus('Code nicht gefunden.', 'err'); return; }
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const loaded = await res.json();
    if (!confirm('Watchlist von "' + raw + '" laden? Überschreibt lokale Daten.')) return;
    state = loaded; save(); setSavedCode(raw);
    document.getElementById('syncCodeInput').value = '';
    Object.values(charts).forEach(c => { try { c.destroy(); } catch(e){} }); charts = {}; infoCache = {};
    document.getElementById('watchlist').innerHTML = '';
    renderAll(); await refreshPrices();
    refreshSyncModalUI(); setSyncStatus('✓ Watchlist geladen!', 'ok');
  } catch(e) { setSyncStatus('Verbindungsfehler.', 'err'); }
  finally { btn.disabled = false; btn.textContent = 'Laden'; }
}

/* ── Init ── */
async function init() {
  await getFxRate();
  renderAll();
  await autoPullOnLoad();
  await refreshPrices();
  setInterval(refreshPrices, 60000);
  setInterval(getFxRate, 300000);
  setInterval(silentPush, 5 * 60 * 1000);
}
init();
