<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Instant Media Album</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --bg-primary: #f8fafc; --bg-card: #ffffff; --text-main: #0f172a; --accent: #6366f1; }
        .dark { --bg-primary: #0f172a; --bg-card: #1e293b; --text-main: #f1f5f9; }

        body { 
            background-color: var(--bg-primary); 
            color: var(--text-main); 
            transition: background-color 0.3s ease; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            user-select: none;
        }
        .card { background-color: var(--bg-card); }

        .masonry { 
            display: block;
            column-count: 2; 
            column-gap: 0.75rem; 
            padding: 0.75rem; 
            padding-bottom: 140px;
        }
        @media (min-width: 768px) { .masonry { column-count: 3; column-gap: 1.5rem; padding: 1.5rem; } }
        @media (min-width: 1024px) { .masonry { column-count: 4; } }

        .masonry-item { break-inside: avoid; margin-bottom: 0.75rem; position: relative; }
        .media-card { transition: transform 0.2s ease; cursor: zoom-in; border-radius: 0.75rem; overflow: hidden; border: 1px solid rgba(0,0,0,0.05); }
        
        .index-badge {
            position: absolute; bottom: 0.5rem; left: 0.5rem;
            background: rgba(0,0,0,0.6); color: white; padding: 2px 8px;
            border-radius: 4px; font-size: 10px; font-weight: bold; backdrop-filter: blur(4px);
        }

        .delete-btn { 
            position: absolute; top: 0.4rem; right: 0.4rem; 
            z-index: 10; background: rgba(220, 38, 38, 0.9); color: white; padding: 0.5rem;
            border-radius: 0.5rem; backdrop-filter: blur(4px); cursor: pointer;
        }

        #lightbox { background-color: #000; }
        
        @keyframes constantPulse {
            0% { transform: scale(var(--base-scale, 1)); }
            50% { transform: scale(calc(var(--base-scale, 1) * 1.05)); }
            100% { transform: scale(var(--base-scale, 1)); }
        }
        .pulse-active { animation: constantPulse var(--pulse-speed, 1.5s) infinite ease-in-out; }

        .explode { animation: explodeEffect 0.6s forwards cubic-bezier(0.1, 0.8, 0.3, 1); }
        @keyframes explodeEffect {
            0% { transform: scale(1); filter: blur(0) brightness(1); opacity: 1; }
            100% { transform: scale(5); filter: blur(50px) brightness(10); opacity: 0; }
        }

        #lightboxMedia { 
            max-width: 95vw;
            max-height: 80vh; 
            object-fit: contain;
            will-change: transform; 
            pointer-events: none;
            position: relative;
            z-index: 5;
        }

        .tap-zone { position: absolute; top: 0; bottom: 0; width: 30%; z-index: 40; cursor: pointer; }
        .tap-zone-left { left: 0; }
        .tap-zone-right { right: 0; }

        .glue-glob {
            position: fixed; bottom: -120px; left: 50%; pointer-events: none; z-index: 9999;
            background: radial-gradient(circle at 30% 30%, #ffffff, #cbd5e1);
            box-shadow: inset -4px -4px 10px rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.1);
            border-radius: 50%;
            animation: sprayAndStick var(--duration) forwards cubic-bezier(0.1, 0.8, 0.2, 1);
        }
        @keyframes sprayAndStick {
            0% { transform: translate(-50%, 0) scale(0.2); opacity: 0; }
            5% { opacity: 1; }
            20% { transform: translate(var(--tx), var(--ty)) scale(1.3); }
            80% { transform: translate(var(--tx), calc(var(--ty) + 60px)) scale(1.1, 1.3); opacity: 1; }
            100% { transform: translate(var(--tx), calc(var(--ty) + 150px)) scale(0.8, 2); opacity: 0; }
        }

        #finalTimeLabel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10000; pointer-events: none; text-align: center;
            font-size: 15vw; font-weight: 900; font-style: italic; text-transform: uppercase;
            color: white; text-shadow: 0 0 40px rgba(0,0,0,0.8);
            line-height: 1; animation: timeFade 4s forwards;
        }
        @keyframes timeFade { 0% { opacity: 0; transform: translate(-50%, -40%); } 10% { opacity: 1; transform: translate(-50%, -50%); } 90% { opacity: 1; } 100% { opacity: 0; } }

        #textPopupOverlay {
            position: fixed; inset: 0; z-index: 100;
            pointer-events: none; opacity: 0; 
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            background: radial-gradient(circle, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.8) 100%);
            backdrop-filter: blur(12px);
        }
        #popupMsg {
            letter-spacing: 0.15em;
            font-weight: 800;
            transform: scale(0.9);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            color: white;
            text-align: center;
            padding: 0 2rem;
            text-transform: uppercase;
        }
        #textPopupOverlay.visible { opacity: 1; }
        #textPopupOverlay.visible #popupMsg { transform: scale(1); }
    </style>
</head>
<body class="min-h-screen font-sans">

    <header class="card border-b sticky top-0 z-40 shadow-sm transition-colors">
        <div class="max-w-7xl mx-auto px-4 py-3 flex flex-col gap-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-2 md:gap-4">
                    <h1 class="text-xl md:text-2xl font-black text-indigo-500 tracking-tighter italic uppercase">Album</h1>
                    <button onclick="toggleDarkMode()" class="p-2 hover:bg-black/5 dark:hover:bg-white/5 rounded-full text-slate-500">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                    </button>
                    <button onclick="toggleUrlInput()" class="p-2 hover:bg-black/5 dark:hover:bg-white/5 rounded-full text-slate-500">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" /></svg>
                    </button>
                </div>
                
                <div class="flex items-center gap-1 md:gap-2">
                    <button onclick="toggleSortMode()" class="bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 px-3 md:px-4 py-2 rounded-xl text-[10px] md:text-xs font-black uppercase">Sort</button>
                    <button onclick="triggerUpload()" class="hidden md:block bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 px-4 py-2 rounded-xl text-xs font-black uppercase">Upload</button>
                    <button onclick="startSlideshow()" class="bg-indigo-600 text-white px-5 py-2 rounded-xl text-xs font-black uppercase shadow-lg shadow-indigo-500/20">Play</button>
                    <button onclick="triggerUniversalFileImport()" class="bg-slate-800 text-white px-3 md:px-4 py-2 rounded-xl text-[10px] md:text-xs font-black uppercase">Load</button>
                    <button onclick="exportSaveFile()" class="hidden md:block bg-slate-800 text-white px-4 py-2 rounded-xl text-xs font-black uppercase">Export</button>
                </div>
            </div>
            <div id="inputWrapper" class="transition-all duration-300 hidden">
                <div id="urlInput" contenteditable="true" class="w-full min-h-[44px] max-h-[100px] overflow-y-auto p-3 border border-slate-200 dark:border-slate-700 rounded-xl text-sm bg-slate-50 dark:bg-slate-900 outline-none" placeholder="Paste links here..." oninput="handleUrlPaste()"></div>
            </div>
            <input type="file" id="fileUpload" class="hidden" multiple accept="image/*,video/*" onchange="handleFileUpload(event)">
            <input type="file" id="universalFileImport" class="hidden" accept="*" onchange="handleUniversalFileImport(event)">
        </div>
    </header>

    <main id="gallery" class="masonry"></main>

    <div id="lightbox" class="fixed inset-0 hidden z-50 flex flex-col select-none overflow-hidden touch-none">
        
        <div class="tap-zone tap-zone-left" onclick="handleTapNav('prev')"></div>
        <div class="tap-zone tap-zone-right" onclick="handleTapNav('next')"></div>

        <div class="absolute top-0 left-0 right-0 p-4 md:p-6 flex justify-between items-center text-white z-[210] bg-gradient-to-b from-black/80 to-transparent pointer-events-none">
            <div class="flex items-center gap-3 md:gap-4 pointer-events-auto">
                 <span id="counter" class="font-mono opacity-40 text-xs md:text-base">0 / 0</span>
                 <button onclick="event.stopPropagation(); appearAgain()" class="px-5 py-3 md:px-4 md:py-2 bg-white/10 active:bg-white/30 rounded-xl text-xs font-black uppercase border border-white/10">Again</button>
                 <button id="finishBtn" onclick="event.stopPropagation(); handleFinishToThis()" class="px-5 py-3 md:px-4 md:py-2 bg-white/10 active:bg-white/30 rounded-xl text-xs font-black uppercase border border-white/10 transition-all">
                    <span id="finishText">Finish</span>
                 </button>
            </div>
            
            <div class="flex items-center gap-2 md:gap-4 pointer-events-auto">
                <div id="countdownBox" class="hidden flex items-center bg-red-600 px-4 py-2 rounded-full border-2 border-white shadow-lg">
                    <span id="countdownDisplay" class="text-white font-black text-xl md:text-2xl italic leading-none">10</span>
                </div>
                <button id="favBtn" onclick="event.stopPropagation(); toggleFavorite()" class="p-2"></button>
                <button onclick="event.stopPropagation(); closeLightbox()" class="p-2"><svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
            </div>
        </div>

        <div id="textPopupOverlay" class="pointer-events-none">
            <h2 id="popupMsg" class="text-3xl md:text-6xl"></h2>
        </div>

        <div class="flex-1 flex items-center justify-center z-10" id="viewport">
            <div id="mediaTarget"></div>
        </div>

        <div class="absolute bottom-0 left-0 right-0 p-6 md:p-8 flex justify-between items-end z-[210] bg-gradient-to-t from-black/80 to-transparent pointer-events-none pb-[env(safe-area-inset-bottom,20px)]">
            <div class="flex items-center gap-4 pointer-events-auto">
                <button id="lightboxTimerBtn" onclick="event.stopPropagation(); toggleTimer()" class="w-16 h-16 md:w-14 md:h-14 bg-white/10 text-white rounded-full flex items-center justify-center hover:bg-white/20 active:scale-95 transition-all border-2 border-white/10">
                    <svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                </button>
                <div id="lbTimerDisplay" class="hidden text-indigo-400 font-mono text-sm font-bold uppercase tracking-widest drop-shadow-lg">Counting...</div>
            </div>

            <div class="flex items-center bg-white/10 border border-white/20 rounded-full px-6 py-4 md:px-5 md:py-2.5 gap-8 md:gap-4 pointer-events-auto backdrop-blur-md">
                <button onclick="event.stopPropagation(); adjustPulse(-0.2)" class="text-white p-1 text-3xl md:text-2xl font-bold">－</button>
                <span class="text-white/40 text-[10px] md:text-[9px] font-black uppercase tracking-widest">Rhythm</span>
                <button onclick="event.stopPropagation(); adjustPulse(0.2)" class="text-white p-1 text-3xl md:text-2xl font-bold">＋</button>
            </div>
        </div>
    </div>

    <div id="mainTimerWrap" class="fixed bottom-24 left-6 md:bottom-8 md:left-8 z-40 flex items-center gap-3">
        <button id="timerBtn" onclick="toggleTimer()" class="w-14 h-14 bg-slate-800 text-white rounded-full shadow-2xl flex items-center justify-center border-2 border-white/20 transition-all active:scale-90">
            <svg class="h-7 w-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        </button>
    </div>

    <!-- Revised Sort Screen -->
    <div id="sortOverlay" class="fixed inset-0 hidden z-[300] bg-slate-950/98 backdrop-blur-2xl flex flex-col overflow-hidden text-white">
        <div class="flex-1 flex flex-col p-4 md:p-8 max-w-4xl mx-auto w-full h-full relative">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black italic tracking-tighter uppercase text-indigo-400">Sequence</h2>
                <button onclick="toggleSortMode()" class="bg-white text-black px-6 py-2 rounded-full font-black uppercase text-[10px]">Done</button>
            </div>
            
            <div id="sortGrid" class="flex-1 overflow-y-auto pb-40 px-2"></div>

            <!-- New Quick-Add Footer Position -->
            <div class="absolute bottom-6 left-4 right-4 bg-indigo-900/40 backdrop-blur-xl p-4 rounded-3xl border border-indigo-500/30 flex gap-2 shadow-2xl shadow-black/50">
                <input id="quickIntermissionText" type="text" placeholder="New Intermission..." class="flex-1 bg-black/40 border border-white/10 rounded-xl px-4 text-sm focus:outline-none focus:border-indigo-500 transition-colors">
                <button onclick="handleQuickAddIntermission()" class="bg-indigo-600 active:bg-indigo-700 w-12 h-12 flex items-center justify-center rounded-xl text-xl font-black">＋</button>
            </div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const gallery = document.getElementById('gallery');
        const lightbox = document.getElementById('lightbox');
        const mediaTarget = document.getElementById('mediaTarget');
        const sortGrid = document.getElementById('sortGrid');

        let allMedia = [];
        let favorites = new Set();
        let currentIndex = -1;
        let pulseDuration = 1.2;
        let finaleMediaId = null; 
        let isFinishing = false;
        let currentFinalePulseSpeed = 1.2;

        window.addEventListener('keydown', (e) => {
            if (lightbox.classList.contains('hidden')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') handleTapNav('next');
            if (e.key === 'ArrowLeft') handleTapNav('prev');
        });

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
        }

        function toggleUrlInput() { document.getElementById('inputWrapper').classList.toggle('hidden'); }

        /**
         * The state is now managed strictly via allMedia array.
         * Parsing only happens when pasting raw text into the urlInput box.
         */
        function handleUrlPaste() {
            const rawText = urlInput.innerText;
            const textLinks = (rawText.match(/(https?:\/\/[^\s<]+[^<.,:;"')\]\s])/g) || []);
            const newLinks = [...new Set(textLinks)].map(url => ({ 
                src: url, 
                id: 'id-' + Math.random().toString(36).substr(2, 9), 
                isVid: !!url.match(/\.(mp4|webm|ogg|mov|m4v)/i), 
                isText: false 
            }));
            
            // Append only new ones
            const existingSrcs = new Set(allMedia.map(m => m.src));
            newLinks.forEach(link => {
                if(!existingSrcs.has(link.src)) allMedia.push(link);
            });

            urlInput.innerHTML = ''; // Clear after processing
            renderGallery();
        }

        function renderGallery() {
            gallery.innerHTML = '';
            let mediaCounter = 0;
            allMedia.forEach((media, idx) => {
                if (media.isText) return; 
                mediaCounter++;
                const item = document.createElement('div');
                item.className = 'masonry-item';
                item.innerHTML = `
                    <div class="media-card" onclick="openLightbox(${idx})">
                        ${media.isVid ? `<div class="aspect-video bg-black flex items-center justify-center opacity-70 text-white">🎬</div>` : `<img src="${media.src}" class="w-full h-auto block" loading="lazy">`}
                        <div class="index-badge">#${mediaCounter}</div>
                    </div>
                    <button onclick="removeMedia('${media.id}'); event.stopPropagation();" class="delete-btn">×</button>`;
                gallery.appendChild(item);
            });
        }

        function openLightbox(idx) {
            if (idx >= allMedia.length) idx = 0;
            if (idx < 0) idx = allMedia.length - 1;
            currentIndex = idx;
            const m = allMedia[currentIndex];
            if (!m) return;
            
            lightbox.classList.remove('hidden');
            document.body.style.overflow = 'hidden';

            if (m.isText) { 
                mediaTarget.innerHTML = '';
                showTextPopup(m.text); 
                setTimeout(() => { 
                    if(!lightbox.classList.contains('hidden') && currentIndex === idx) handleTapNav('next'); 
                }, 2000); 
            } else {
                mediaTarget.innerHTML = '';
                let el = document.createElement(m.isVid ? 'video' : 'img');
                if (m.isVid) { el.controls = true; el.autoplay = true; el.playsInline = true; }
                el.id = 'lightboxMedia'; el.src = m.src;
                mediaTarget.appendChild(el);
            }
            
            updateCounter(); updatePulseState(); updateFinishUI(); updateFavUI();
        }

        function handleTapNav(dir) { if(!isFinishing) openLightbox(dir === 'next' ? currentIndex + 1 : currentIndex - 1); }
        
        function showTextPopup(msg) { 
            const o = document.getElementById('textPopupOverlay'); 
            document.getElementById('popupMsg').innerText = msg; 
            o.classList.add('visible');
            setTimeout(() => { o.classList.remove('visible'); }, 2000); 
        }

        function closeLightbox() { 
            lightbox.classList.add('hidden'); 
            document.body.style.overflow = ''; 
            mediaTarget.innerHTML = ''; 
            isFinishing = false; 
            document.getElementById('countdownBox').classList.add('hidden'); 
            document.getElementById('textPopupOverlay').classList.remove('visible');
        }
        
        function toggleFavorite() { 
            const m = allMedia[currentIndex]; 
            if(!m || isFinishing) return; 
            if(favorites.has(m.id)) favorites.delete(m.id); 
            else favorites.add(m.id); 
            updateFavUI(); updatePulseState(); 
        }
        
        function handleFinishToThis() {
            const m = allMedia[currentIndex]; if(!m || isFinishing) return;
            if (finaleMediaId === m.id) startFinale(); 
            else if (finaleMediaId && allMedia.some(item => item.id === finaleMediaId)) { 
                openLightbox(allMedia.findIndex(i => i.id === finaleMediaId)); 
                setTimeout(() => startFinale(), 100); 
            }
            else { finaleMediaId = m.id; updateFinishUI(); }
        }

        function startFinale() {
            isFinishing = true; document.getElementById('countdownBox').classList.remove('hidden');
            let c = 10; const disp = document.getElementById('countdownDisplay'); disp.innerText = c;
            const timer = setInterval(() => {
                c--; disp.innerText = Math.max(0, c);
                currentFinalePulseSpeed = pulseDuration * Math.pow(0.01, (10-c)/10);
                updatePulseState();
                if(c <= 0) { clearInterval(timer); triggerExplosion(); }
            }, 1000);
        }

        function triggerExplosion() {
            const el = document.getElementById('lightboxMedia'); el?.classList.add('explode');
            setTimeout(() => { 
                el?.classList.remove('explode'); 
                isFinishing = false; 
                document.getElementById('countdownBox').classList.add('hidden'); 
                spawnGlueSplatter("COMPLETE"); 
                updatePulseState(); 
                updateFinishUI(); 
            }, 600);
        }

        function updatePulseState() {
            const el = document.getElementById('lightboxMedia');
            if(!el) return;
            const isFav = favorites.has(allMedia[currentIndex]?.id);
            if(!isFinishing && !isFav) { el.classList.remove('pulse-active'); return; }
            el.classList.add('pulse-active'); 
            el.style.setProperty('--pulse-speed', `${isFinishing ? currentFinalePulseSpeed : pulseDuration}s`);
        }

        function updateFinishUI() {
            const b = document.getElementById('finishBtn'), t = document.getElementById('finishText'), m = allMedia[currentIndex];
            if(finaleMediaId && m && m.id === finaleMediaId) { t.innerText = "START FINALE"; b.classList.add('bg-indigo-600'); b.style.opacity = '1'; }
            else if (finaleMediaId) { t.innerText = "JUMP TO FINALE"; b.classList.remove('bg-indigo-600'); b.style.opacity = '0.5'; }
            else { t.innerText = "SET FINISH"; b.classList.remove('bg-indigo-600'); b.style.opacity = '0.5'; }
        }

        function updateFavUI() {
            const isFav = favorites.has(allMedia[currentIndex]?.id);
            document.getElementById('favBtn').innerHTML = isFav ? `<svg class="h-6 w-6 text-pink-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>` : `<svg class="h-6 w-6 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>`;
        }

        function updateCounter() { 
            const mediaOnly = allMedia.filter(m => !m.isText);
            const currentObj = allMedia[currentIndex];
            if (!currentObj) return;
            if (currentObj.isText) { document.getElementById('counter').innerText = `T / ${mediaOnly.length}`; } 
            else {
                const currentMediaIndex = mediaOnly.indexOf(currentObj) + 1;
                document.getElementById('counter').innerText = `${currentMediaIndex} / ${mediaOnly.length}`; 
            }
        }

        function adjustPulse(v) { pulseDuration = Math.max(0.1, pulseDuration - v); updatePulseState(); }

        let timerInt, secs = 0, isRunning = false;
        function toggleTimer() {
            const lbDisp = document.getElementById('lbTimerDisplay'), lbBtn = document.getElementById('lightboxTimerBtn');
            const mainBtn = document.getElementById('timerBtn');
            if(!isRunning) { 
                isRunning = true; secs = 0; 
                if(lbDisp) { lbDisp.classList.remove('hidden'); lbDisp.innerText = "COUNTING..."; }
                if(lbBtn) lbBtn.classList.add('bg-indigo-600');
                mainBtn.classList.add('bg-indigo-600', 'scale-110');
                timerInt = setInterval(() => { secs++; }, 1000); 
            }
            else { 
                isRunning = false; clearInterval(timerInt); 
                if(lbDisp) lbDisp.classList.add('hidden');
                if(lbBtn) lbBtn.classList.remove('bg-indigo-600');
                mainBtn.classList.remove('bg-indigo-600', 'scale-110');
                const timeStr = `${Math.floor(secs/60).toString().padStart(2,'0')}:${(secs%60).toString().padStart(2,'0')}`;
                spawnGlueSplatter(timeStr); 
            }
        }

        function spawnGlueSplatter(text) {
            const label = document.createElement('div'); 
            label.id = 'finalTimeLabel';
            label.innerText = text; 
            document.body.appendChild(label); 
            setTimeout(() => label.remove(), 4000);
            for(let i=0; i<25; i++) {
                const g = document.createElement('div'); g.className = 'glue-glob';
                const s = Math.random()*100 + 40; g.style.width = s + 'px'; g.style.height = s + 'px';
                g.style.setProperty('--tx', (Math.random()-0.5) * window.innerWidth + 'px');
                g.style.setProperty('--ty', - (Math.random()*window.innerHeight*0.8 + 100) + 'px');
                g.style.setProperty('--duration', (5 + Math.random()*5) + 's');
                document.body.appendChild(g); setTimeout(() => g.remove(), 10000);
            }
        }

        function triggerUpload() { document.getElementById('fileUpload').click(); }
        function handleFileUpload(e) { 
            Array.from(e.target.files).forEach(f => { 
                const r = new FileReader(); 
                r.readAsDataURL(f); 
                r.onload = () => { 
                    allMedia.push({ src: r.result, id: 'f-'+Date.now()+Math.random(), isVid: f.type.startsWith('video'), isText: false }); 
                    renderGallery(); 
                }; 
            }); 
        }
        
        function triggerUniversalFileImport() { document.getElementById('universalFileImport').click(); }
        function handleUniversalFileImport(e) { 
            const f = e.target.files[0]; 
            if(!f) return; 
            const r = new FileReader(); 
            r.onload = (ev) => { 
                let rawData = ev.target.result;
                try { 
                    const d = JSON.parse(rawData); 
                    allMedia = d.m || []; 
                    favorites = new Set(d.f || []); 
                    renderGallery();
                } catch(err) { console.error("Load failed.", err); } 
            }; 
            r.readAsText(f); 
        }

        function exportSaveFile() { 
            const d = JSON.stringify({ m: allMedia, f: Array.from(favorites) });
            const blob = new Blob([d], { type: "text/plain" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `album-${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function toggleSortMode() { 
            const overlay = document.getElementById('sortOverlay');
            overlay.classList.toggle('hidden'); 
            if(!overlay.classList.contains('hidden')) renderSortGrid(); 
            else renderGallery();
        }
        
        function renderSortGrid() {
            sortGrid.innerHTML = '';
            let mediaCounter = 0;
            allMedia.forEach((m, i) => {
                if (!m.isText) mediaCounter++;
                const el = document.createElement('div');
                el.className = 'flex items-center bg-white/5 p-3 rounded-xl mb-2 gap-3 group hover:bg-white/10 transition-all cursor-move border border-white/5';
                el.dataset.id = m.id;
                el.innerHTML = `
                    <div class="w-8 font-mono text-[10px] opacity-30">${m.isText ? '---' : '#' + mediaCounter}</div>
                    <div class="w-12 h-12 bg-black rounded overflow-hidden flex-shrink-0 flex items-center justify-center">
                        ${m.isText ? '<span class="text-indigo-400 font-black italic">TEXT</span>' : `<img src="${m.src}" class="w-full h-full object-cover">`}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="truncate text-xs ${m.isText ? 'text-indigo-300 font-bold italic' : 'text-white/60'}">${m.isText ? m.text : 'Media Asset'}</div>
                        ${m.isText ? '<div class="text-[9px] uppercase opacity-30 font-black tracking-widest mt-0.5">Intermission</div>' : ''}
                    </div>
                    <button onclick="event.stopPropagation(); removeMedia('${m.id}'); renderSortGrid();" class="text-red-500 opacity-60 hover:opacity-100 p-2 text-xl font-bold">×</button>
                `;
                sortGrid.appendChild(el);
            });
            new Sortable(sortGrid, { animation: 150, onEnd: () => {
                const ids = Array.from(sortGrid.children).map(c => c.dataset.id);
                allMedia = ids.map(id => allMedia.find(m => m.id === id));
            }});
        }

        function handleQuickAddIntermission() {
            const input = document.getElementById('quickIntermissionText');
            const val = input.value.trim();
            if(!val) return;
            allMedia.push({ id: 't-'+Date.now(), isText: true, text: val }); 
            input.value = '';
            renderSortGrid();
            // Scroll to bottom
            sortGrid.scrollTo({ top: sortGrid.scrollHeight, behavior: 'smooth' });
        }

        function startSlideshow() { if(allMedia.length) openLightbox(0); }
        function removeMedia(id) { 
            allMedia = allMedia.filter(m => m.id !== id); 
            if(favorites.has(id)) favorites.delete(id);
            if(finaleMediaId === id) finaleMediaId = null;
        }
        function appearAgain() { 
            const c = allMedia[currentIndex]; 
            if(!c) return; 
            allMedia.splice(currentIndex + 10, 0, {...c, id: 'a-'+Date.now()+Math.random()}); 
        }

        if(localStorage.getItem('darkMode') === 'true') toggleDarkMode();
        // Start empty or with placeholder
        renderGallery();
    </script>
</body>
</html>
