<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Französisch Verb-Trainer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-select { -webkit-tap-highlight-color: transparent; user-select: none; }
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { backface-visibility: hidden; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .card-back { transform: rotateY(180deg); }
        
        @media (min-width: 768px) {
            .mobile-only { display: none; }
            .desktop-only { display: flex; }
        }
        @media (max-width: 767px) {
            .mobile-only { display: flex; }
            .desktop-only { display: none; }
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4f46e5;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .star-active { fill: #f59e0b; stroke: #f59e0b; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 pb-20 md:pb-0 md:pt-20">

    <!-- Desktop Navigation -->
    <nav class="desktop-only fixed top-0 left-0 right-0 bg-white border-b border-slate-200 px-8 py-4 justify-between items-center z-50 shadow-sm">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🇫🇷</span>
            <h1 class="text-xl font-black text-indigo-700 uppercase tracking-tighter">Verb-Meister</h1>
        </div>
        <div class="flex gap-8">
            <button onclick="setMode('study')" class="nav-link font-bold text-xs uppercase tracking-widest text-slate-400 hover:text-indigo-600 transition-colors">Lernen</button>
            <button onclick="setMode('flashcard')" class="nav-link font-bold text-xs uppercase tracking-widest text-slate-400 hover:text-indigo-600 transition-colors">Karten</button>
            <button onclick="setMode('quiz')" class="nav-link font-bold text-xs uppercase tracking-widest text-slate-400 hover:text-indigo-600 transition-colors">Quiz</button>
        </div>
        <div class="flex bg-slate-100 p-1 rounded-xl border border-slate-200">
            <button onclick="setTense('cond')" id="d-btn-cond" class="px-4 py-1.5 rounded-lg text-[10px] font-black transition-all">COND</button>
            <button onclick="setTense('imp')" id="d-btn-imp" class="px-4 py-1.5 rounded-lg text-[10px] font-black transition-all">IMP</button>
            <button onclick="setTense('pc')" id="d-btn-pc" class="px-4 py-1.5 rounded-lg text-[10px] font-black transition-all">PC</button>
        </div>
    </nav>

    <div id="app" class="max-w-6xl mx-auto p-4 md:p-8">
        <!-- Loading State -->
        <div id="loading-overlay" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center gap-4">
            <div class="loader"></div>
            <p class="text-sm font-bold text-slate-400 animate-pulse">Lade Verben...</p>
        </div>

        <!-- Mobile Header -->
        <header class="mobile-only text-center mb-6 pt-4">
            <h1 class="text-2xl font-black text-indigo-700">Verb-Meister 🇫🇷</h1>
            <p id="mobile-tense-label" class="text-indigo-400 font-bold text-[10px] uppercase tracking-[0.3em] mt-1">Conditionnel</p>
        </header>

        <main id="main-content" class="opacity-0 transition-opacity duration-500">
            <!-- Dynamic Content -->
        </main>
    </div>

    <!-- Mobile Navigation -->
    <nav class="mobile-only fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-8 py-3 justify-between items-center z-50 shadow-[0_-4px_15px_rgba(0,0,0,0.05)]">
        <button onclick="setMode('study')" id="m-nav-study" class="flex flex-col items-center gap-1 text-slate-300">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16" /></svg>
            <span class="text-[9px] font-black">LISTE</span>
        </button>
        <button onclick="setMode('flashcard')" id="m-nav-flashcard" class="flex flex-col items-center gap-1 text-slate-300">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
            <span class="text-[9px] font-black">KARTEN</span>
        </button>
        <button onclick="setMode('quiz')" id="m-nav-quiz" class="flex flex-col items-center gap-1 text-slate-300">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            <span class="text-[9px] font-black">QUIZ</span>
        </button>
        <button onclick="toggleTenseMenu()" class="flex flex-col items-center gap-1 text-indigo-600">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            <span class="text-[9px] font-black">ZEIT</span>
        </button>
    </nav>

    <!-- Mobile Tense Picker -->
    <div id="tense-modal" class="hidden fixed inset-0 bg-slate-900/60 z-[110] flex items-end justify-center backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-t-[2.5rem] p-8 pb-12 shadow-2xl">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
            <h3 class="text-lg font-black mb-6 text-center text-slate-800">Zeitform wählen</h3>
            <div class="grid gap-4">
                <button onclick="setTense('cond')" class="w-full py-5 bg-indigo-50 text-indigo-700 rounded-2xl font-black text-sm">Conditionnel</button>
                <button onclick="setTense('imp')" class="w-full py-5 bg-emerald-50 text-emerald-700 rounded-2xl font-black text-sm">Imparfait</button>
                <button onclick="setTense('pc')" class="w-full py-5 bg-amber-50 text-amber-700 rounded-2xl font-black text-sm">Passé Composé</button>
                <button onclick="toggleTenseMenu()" class="w-full py-4 text-slate-400 font-bold text-xs uppercase tracking-widest mt-2">Schließen</button>
            </div>
        </div>
    </div>

    <script>
        let verbs = [];
        let randomizedVerbs = [];
        let currentTense = 'cond';
        let currentMode = 'study';
        let score = 0;
        let flashcardIndex = 0;
        let quizActiveVerb = null;
        let favorites = JSON.parse(localStorage.getItem('verbFavorites') || '[]');

        const csvUrl = "https://raw.githubusercontent.com/frenchverbes/frenchverbes.github.io/main/verbes.csv";

        async function loadVerbs() {
            try {
                let response = await fetch(csvUrl);
                let text = await response.text();
                parseCSV(text);
                shuffleVerbs();
            } catch (e) {
                console.error("Load failed", e);
            } finally {
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('main-content').classList.replace('opacity-0', 'opacity-100');
                render();
            }
        }

        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const data = [];
            for (let i = 1; i < lines.length; i++) {
                const parts = lines[i].split(';');
                if (parts.length >= 6) {
                    data.push({
                        id: i,
                        de: parts[0],
                        inf: parts[1],
                        cond: parts[2],
                        imp: parts[3],
                        pc: parts[4],
                        cat: parts[5].trim()
                    });
                }
            }
            verbs = data;
        }

        function shuffleVerbs() {
            randomizedVerbs = [...verbs].sort(() => Math.random() - 0.5);
        }

        function toggleFavorite(id, event) {
            if(event) event.stopPropagation();
            if (favorites.includes(id)) {
                favorites = favorites.filter(fid => fid !== id);
            } else {
                favorites.push(id);
            }
            localStorage.setItem('verbFavorites', JSON.stringify(favorites));
            render();
        }

        function setTense(t) {
            currentTense = t;
            ['cond', 'imp', 'pc'].forEach(id => {
                const btn = document.getElementById(`d-btn-${id}`);
                if(btn) btn.className = id === t ? "px-4 py-1.5 rounded-lg text-[10px] font-black bg-white shadow-sm text-indigo-600" : "px-4 py-1.5 rounded-lg text-[10px] font-black text-slate-400 hover:text-slate-600";
            });
            document.getElementById('mobile-tense-label').innerText = t === 'cond' ? 'Conditionnel' : t === 'imp' ? 'Imparfait' : 'Passé Composé';
            if (!document.getElementById('tense-modal').classList.contains('hidden')) toggleTenseMenu();
            render();
        }

        function toggleTenseMenu() {
            document.getElementById('tense-modal').classList.toggle('hidden');
        }

        function setMode(m) {
            currentMode = m;
            if (m === 'flashcard' || m === 'quiz') shuffleVerbs();
            flashcardIndex = 0;
            quizActiveVerb = null;
            render();
        }

        function render() {
            const main = document.getElementById('main-content');
            main.innerHTML = '';
            if (currentMode === 'study') renderStudy(main);
            if (currentMode === 'flashcard') renderFlashcard(main);
            if (currentMode === 'quiz') renderQuiz(main);
        }

        function renderStudy(container) {
            const cats = [...new Set(verbs.map(v => v.cat))].sort((a,b) => {
                if(a.includes('PARTICULIERS') || a.includes('IRR')) return -1;
                return 1;
            });

            cats.forEach(cat => {
                const vList = verbs.filter(v => v.cat === cat);
                const section = document.createElement('div');
                section.className = "mb-12";
                const isSpecial = cat.includes('PARTICULIERS') || cat.includes('IRR');
                
                section.innerHTML = `
                    <h2 class="text-[10px] font-black ${isSpecial ? 'text-indigo-500' : 'text-slate-300'} uppercase tracking-[0.3em] mb-6 flex items-center gap-3">
                        ${cat}
                    </h2>
                    <div class="grid gap-3">
                        ${vList.map(v => `
                            <div class="bg-white p-5 rounded-[1.5rem] border ${isSpecial ? 'border-indigo-100 bg-indigo-50/20' : 'border-slate-200'} shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-4 relative group">
                                <button onclick="toggleFavorite(${v.id})" class="absolute top-4 right-4 text-slate-300 hover:text-amber-500 transition-colors">
                                    <svg class="w-5 h-5 ${favorites.includes(v.id) ? 'star-active' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.382-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path></svg>
                                </button>
                                <div class="md:w-1/4">
                                    <div class="text-[9px] font-black text-slate-300 uppercase leading-none mb-1">${v.de}</div>
                                    <div class="text-lg font-bold text-slate-800">${v.inf}</div>
                                </div>
                                <div class="grid grid-cols-3 gap-2 flex-grow">
                                    <div class="bg-indigo-50/50 p-3 rounded-2xl border border-indigo-100/50">
                                        <div class="text-[8px] font-black text-indigo-300 uppercase mb-0.5">Cond.</div>
                                        <div class="text-xs font-mono font-bold text-indigo-700">je ${v.cond}</div>
                                    </div>
                                    <div class="bg-emerald-50/50 p-3 rounded-2xl border border-emerald-100/50">
                                        <div class="text-[8px] font-black text-emerald-300 uppercase mb-0.5">Imp.</div>
                                        <div class="text-xs font-mono font-bold text-emerald-700">je ${v.imp}</div>
                                    </div>
                                    <div class="bg-amber-50/50 p-3 rounded-2xl border border-amber-100/50">
                                        <div class="text-[8px] font-black text-amber-300 uppercase mb-0.5">P.C.</div>
                                        <div class="text-xs font-mono font-bold text-amber-700">${v.pc}</div>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(section);
            });
        }

        function renderFlashcard(container) {
            const v = randomizedVerbs[flashcardIndex % randomizedVerbs.length];
            container.innerHTML = `
                <div class="max-w-md mx-auto space-y-8 py-6">
                    <div class="h-96 no-select" style="perspective: 2000px;" onclick="this.querySelector('.card-inner').classList.toggle('card-flipped')">
                        <div class="card-inner relative w-full h-full shadow-2xl rounded-[2.5rem]">
                            <div class="card-front bg-white rounded-[2.5rem] p-10 flex flex-col items-center justify-center border-b-8 border-indigo-500">
                                <button onclick="toggleFavorite(${v.id}, event)" class="absolute top-6 right-6 text-slate-300 hover:text-amber-500">
                                    <svg class="w-6 h-6 ${favorites.includes(v.id) ? 'star-active' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.382-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path></svg>
                                </button>
                                <span class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-6">Deutsch</span>
                                <h2 class="text-4xl font-black text-slate-800 text-center leading-tight">${v.de}</h2>
                                <p class="mt-12 text-indigo-300 text-[10px] font-bold uppercase tracking-widest italic">Antippen</p>
                            </div>
                            <div class="card-back bg-indigo-600 rounded-[2.5rem] p-10 flex flex-col items-center justify-center text-white border-8 border-indigo-500 shadow-inner">
                                <div class="text-[10px] font-bold opacity-50 uppercase tracking-widest mb-2">Lösung</div>
                                <div class="text-2xl font-light italic mb-8">${v.inf}</div>
                                <div class="w-full space-y-4">
                                    <div class="bg-white/10 p-4 rounded-2xl">
                                        <div class="text-[8px] uppercase opacity-60 font-black mb-1">Conditionnel</div>
                                        <div class="text-xl font-bold">je ${v.cond}</div>
                                    </div>
                                    <div class="bg-white/10 p-4 rounded-2xl">
                                        <div class="text-[8px] uppercase opacity-60 font-black mb-1">Imparfait</div>
                                        <div class="text-xl font-bold">je ${v.imp}</div>
                                    </div>
                                    <div class="bg-white/10 p-4 rounded-2xl">
                                        <div class="text-[8px] uppercase opacity-60 font-black mb-1">Passé Composé</div>
                                        <div class="text-xl font-bold">${v.pc}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-4">
                        <button onclick="flashcardIndex = (flashcardIndex - 1 + randomizedVerbs.length) % randomizedVerbs.length; render();" class="flex-1 bg-white p-5 rounded-2xl font-black text-xs text-slate-400 border border-slate-200">ZURÜCK</button>
                        <button onclick="flashcardIndex = (flashcardIndex + 1) % randomizedVerbs.length; render();" class="flex-1 bg-indigo-600 text-white p-5 rounded-2xl font-black text-xs shadow-xl shadow-indigo-100">ZUFÄLLIG NÄCHSTE</button>
                    </div>
                </div>
            `;
        }

        function renderQuiz(container) {
            if (!quizActiveVerb) {
                quizActiveVerb = randomizedVerbs[Math.floor(Math.random() * randomizedVerbs.length)];
            }
            const v = quizActiveVerb;
            const tenseTitle = currentTense === 'cond' ? 'Conditionnel' : currentTense === 'imp' ? 'Imparfait' : 'Passé Composé';
            
            container.innerHTML = `
                <div class="max-w-md mx-auto bg-white rounded-[2.5rem] p-10 shadow-2xl border border-slate-100 relative">
                    <button onclick="toggleFavorite(${v.id}, event)" class="absolute top-10 right-10 text-slate-300 hover:text-amber-500">
                        <svg class="w-6 h-6 ${favorites.includes(v.id) ? 'star-active' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.382-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path></svg>
                    </button>
                    <div class="flex justify-between items-center mb-10">
                        <span class="text-[9px] font-black text-indigo-400 uppercase tracking-widest">${tenseTitle}</span>
                        <span class="bg-indigo-600 text-white px-4 py-1.5 rounded-full text-[10px] font-black">${score} PKT</span>
                    </div>
                    <div class="text-center mb-10">
                        <h2 class="text-4xl font-black text-slate-800 mb-2">${v.de}</h2>
                        <p class="text-slate-400 text-xs font-bold uppercase tracking-widest italic">Form: 1. Pers. Sing.</p>
                    </div>
                    <div id="quiz-inputs" class="space-y-4">
                        <div class="group">
                            <label class="text-[9px] font-black text-slate-300 uppercase ml-4">Infinitiv</label>
                            <input type="text" id="q-inf" autocomplete="off" class="w-full p-5 bg-slate-50 border-2 border-transparent focus:border-indigo-500 rounded-2xl outline-none font-bold text-lg transition-all" placeholder="...">
                        </div>
                        <div class="group">
                            <label class="text-[9px] font-black text-slate-300 uppercase ml-4">Konjugation</label>
                            <input type="text" id="q-conj" autocomplete="off" class="w-full p-5 bg-slate-50 border-2 border-transparent focus:border-indigo-500 rounded-2xl outline-none font-bold text-lg transition-all" placeholder="je ...">
                        </div>
                        <button id="check-btn" onclick="checkQuiz('${v.inf}', '${v[currentTense]}')" class="w-full bg-indigo-600 text-white font-black py-6 rounded-2xl shadow-xl shadow-indigo-100 active:scale-95 transition-transform mt-4 text-sm tracking-widest">PRÜFEN</button>
                    </div>
                    <div id="fb" class="mt-8 hidden p-5 rounded-2xl text-center font-bold text-sm"></div>
                    <button id="next-btn" onclick="nextQuiz()" class="hidden w-full bg-slate-800 text-white font-black py-6 rounded-2xl shadow-xl active:scale-95 transition-transform mt-4 text-sm tracking-widest uppercase">Nächste Frage</button>
                </div>
            `;
        }

        function checkQuiz(inf, conj) {
            const userInf = document.getElementById('q-inf').value.trim().toLowerCase();
            const userConj = document.getElementById('q-conj').value.trim().toLowerCase();
            
            const cleanedConj = userConj.replace(/^je\s+/, '').replace(/^j'/, '');
            const targetConj = conj.toLowerCase().replace(/^je\s+/, '').replace(/^j'/, '');

            const isCorrect = userInf === inf.toLowerCase() && cleanedConj === targetConj;
            
            const fb = document.getElementById('fb');
            fb.classList.remove('hidden');
            
            // Disable inputs
            document.getElementById('q-inf').disabled = true;
            document.getElementById('q-conj').disabled = true;
            document.getElementById('check-btn').classList.add('hidden');
            document.getElementById('next-btn').classList.remove('hidden');

            if (isCorrect) {
                score += 10;
                fb.className = "mt-8 p-5 rounded-2xl text-center font-bold text-sm bg-emerald-50 text-emerald-700 border border-emerald-100";
                fb.innerHTML = "✨ Sehr gut! +10 Punkte";
            } else {
                fb.className = "mt-8 p-5 rounded-2xl text-center font-bold text-sm bg-rose-50 text-rose-700 border border-rose-100";
                fb.innerHTML = `Lösung: <span class="block text-lg mt-1">${inf} & je ${conj}</span>`;
            }
        }

        function nextQuiz() {
            quizActiveVerb = null;
            render();
        }

        loadVerbs();
    </script>
</body>
</html>
